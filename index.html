<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trivia Mundialista WC 2026</title>
<script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0e1a;--surface:#111827;--surface2:#1a2235;
  --border:rgba(255,255,255,0.08);--accent:#e8ff47;--accent2:#00d4ff;
  --text:#f0f4ff;--muted:#8892a4;--red:#ff4757;--green:#2ed573;
  --gold:#ffd700;--orange:#ff9f43;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
#root{min-height:100vh;}
.app{min-height:100vh;display:flex;flex-direction:column;}
.header{background:#0a0e1a;border-bottom:1px solid var(--border);padding:0 1.5rem;position:sticky;top:0;z-index:100;}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:60px;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:2px;color:var(--accent);}
.logo-row{display:flex;align-items:center;gap:12px;}
.more-trivias-btn{background:rgba(232,255,71,0.1);border:1px solid rgba(232,255,71,0.3);border-radius:20px;padding:6px 14px;font-size:0.75rem;font-weight:700;color:var(--accent);cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;}
.more-trivias-btn:hover{background:rgba(232,255,71,0.18);}
.logo span{color:var(--accent2);}
.nav{display:flex;gap:4px;}
.nav-btn{background:none;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:0.8rem;font-weight:500;padding:6px 14px;border-radius:20px;cursor:pointer;transition:all 0.2s;letter-spacing:0.5px;text-transform:uppercase;}
.nav-btn.active{background:var(--accent);color:#0a0e1a;}
.nav-btn:hover:not(.active){color:var(--text);background:var(--surface2);}
.user-bar{display:flex;align-items:center;gap:10px;}
.user-chip{font-size:0.8rem;color:var(--muted);display:flex;align-items:center;gap:6px;}
.user-chip strong{color:var(--text);}
.points-pill{background:rgba(232,255,71,0.1);border:1px solid rgba(232,255,71,0.2);border-radius:20px;padding:4px 12px;font-size:0.75rem;font-weight:600;color:var(--accent);}
.logout-btn{background:none;border:1px solid var(--border);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:0.75rem;padding:5px 10px;border-radius:6px;cursor:pointer;transition:all 0.2s;}
.logout-btn:hover{border-color:var(--red);color:var(--red);}
.main{flex:1;max-width:1200px;margin:0 auto;width:100%;padding:1.5rem;}
.picks-layout{display:grid;grid-template-columns:1fr 320px;gap:1.5rem;align-items:start;}
@media(max-width:900px){.picks-layout{grid-template-columns:1fr;}}
.sidebar{position:sticky;top:76px;}
.sidebar-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.sidebar-header{background:var(--surface2);padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.sidebar-title{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:1.5px;color:var(--accent);}
.sidebar-subtitle{font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.standings-table{width:100%;border-collapse:collapse;}
.standings-table th{font-size:0.62rem;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);padding:8px 6px;text-align:center;border-bottom:1px solid var(--border);}
.standings-table th:first-child{text-align:left;padding-left:12px;}
.standings-table td{font-size:0.78rem;padding:7px 6px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.04);}
.standings-table td:first-child{text-align:left;padding-left:12px;}
.standings-table tr:last-child td{border-bottom:none;}
.standings-table tr.qualify{background:rgba(0,212,255,0.04);}
.standings-table tr.qualify td:first-child{border-left:2px solid var(--accent2);}
.standings-table tr.maybe{background:rgba(232,255,71,0.03);}
.standings-table tr.maybe td:first-child{border-left:2px solid rgba(232,255,71,0.4);}
.team-cell{display:flex;align-items:center;gap:6px;font-weight:500;white-space:nowrap;}
.team-cell .flag{font-size:1rem;}
.team-cell .tname{font-size:0.78rem;max-width:90px;overflow:hidden;text-overflow:ellipsis;}
.pos-num{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--muted);width:16px;}
.pts-val{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--accent);}
.diff-pos{color:var(--green);font-size:0.75rem;font-weight:600;}
.diff-neg{color:var(--red);font-size:0.75rem;font-weight:600;}
.diff-zero{color:var(--muted);font-size:0.75rem;}
.group-tabs{display:flex;flex-wrap:wrap;gap:4px;padding:10px 12px;border-bottom:1px solid var(--border);}
.group-tab{background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:0.7rem;font-weight:600;padding:4px 9px;border-radius:6px;cursor:pointer;transition:all 0.15s;}
.group-tab.active{background:var(--accent2);color:#0a0e1a;border-color:var(--accent2);}
.group-tab:hover:not(.active){color:var(--text);border-color:var(--muted);}
.standings-legend{padding:8px 12px;display:flex;gap:12px;border-top:1px solid var(--border);}
.legend-item{display:flex;align-items:center;gap:5px;font-size:0.62rem;color:var(--muted);}
.legend-dot{width:8px;height:8px;border-radius:1px;flex-shrink:0;}
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2.5rem;width:100%;max-width:400px;}
.auth-title{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;letter-spacing:3px;margin-bottom:0.25rem;}
.auth-sub{color:var(--muted);font-size:0.9rem;margin-bottom:2rem;}
.field{margin-bottom:1rem;}
.field label{display:block;font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px;}
.field input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.95rem;padding:10px 14px;outline:none;transition:border-color 0.2s;}
.field input:focus{border-color:var(--accent);}
.btn{width:100%;padding:12px;border-radius:8px;border:none;font-family:'DM Sans',sans-serif;font-size:0.95rem;font-weight:600;cursor:pointer;transition:all 0.2s;}
.btn-primary{background:var(--accent);color:#0a0e1a;}
.btn-primary:hover{background:#d4eb00;transform:translateY(-1px);}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.auth-toggle{text-align:center;margin-top:1.5rem;font-size:0.85rem;color:var(--muted);}
.auth-toggle a{color:var(--accent);cursor:pointer;font-weight:600;}
.error-msg{background:rgba(255,71,87,0.1);border:1px solid rgba(255,71,87,0.3);border-radius:8px;padding:10px 14px;font-size:0.85rem;color:var(--red);margin-bottom:1rem;}
.success-msg{background:rgba(46,213,115,0.1);border:1px solid rgba(46,213,115,0.3);border-radius:8px;padding:10px 14px;font-size:0.85rem;color:var(--green);margin-bottom:1rem;}
.stage-filter{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.5rem;}
.stage-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:0.75rem;font-weight:600;padding:6px 14px;border-radius:20px;cursor:pointer;transition:all 0.2s;text-transform:uppercase;letter-spacing:0.5px;}
.stage-btn.active{background:var(--accent2);color:#0a0e1a;border-color:var(--accent2);}
.stage-btn:hover:not(.active){border-color:var(--muted);color:var(--text);}
.match-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:12px;overflow:hidden;transition:border-color 0.2s;position:relative;}
.match-card:hover{border-color:rgba(255,255,255,0.15);}
.match-card.picked{border-color:rgba(232,255,71,0.3);}
.match-card.locked-card{opacity:0.75;}
.match-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface2);}
.match-meta{font-size:0.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;}
.match-time-str{font-size:0.72rem;color:var(--muted);}
.lock-badge{font-size:0.65rem;padding:3px 8px;border-radius:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap;}
.lock-badge.open{background:rgba(46,213,115,0.15);color:var(--green);}
.lock-badge.locked{background:rgba(255,71,87,0.15);color:var(--red);}
.lock-badge.soon{background:rgba(255,159,67,0.15);color:var(--orange);}
.countdown-bar{display:flex;align-items:center;justify-content:center;gap:8px;padding:6px 16px;background:rgba(255,159,67,0.08);border-bottom:1px solid rgba(255,159,67,0.15);}
.countdown-label{font-size:0.7rem;color:var(--orange);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;}
.countdown-digits{display:flex;gap:4px;align-items:center;}
.cd-block{background:rgba(255,159,67,0.15);border:1px solid rgba(255,159,67,0.25);border-radius:5px;padding:2px 6px;min-width:32px;text-align:center;}
.cd-num{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--orange);line-height:1;}
.cd-unit{font-size:0.55rem;color:var(--orange);opacity:0.7;text-transform:uppercase;}
.cd-sep{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--orange);opacity:0.5;}
.match-body{padding:14px 16px;position:relative;}
.teams{display:flex;align-items:center;justify-content:center;gap:1rem;margin-bottom:14px;}
.team{text-align:center;flex:1;}
.team-flag{font-size:2rem;display:block;margin-bottom:4px;}
.team-name{font-size:0.85rem;font-weight:600;}
.vs{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--muted);letter-spacing:2px;}
.result-score{text-align:center;margin-bottom:10px;font-size:1.1rem;font-weight:600;color:var(--accent);}
.pick-row{display:flex;gap:8px;}
.pick-group{flex:1;}
.pick-label{font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);margin-bottom:6px;text-align:center;}
.pick-options{display:flex;gap:4px;}
.pick-btn{flex:1;padding:8px 4px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:0.78rem;font-weight:600;cursor:pointer;transition:background 0.08s,color 0.08s,border-color 0.08s;text-align:center;}
.pick-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
.pick-btn.selected{background:var(--accent);color:#0a0e1a;border-color:var(--accent);}
.pick-btn:disabled{cursor:not-allowed;opacity:0.5;}
.pick-saved-toast{position:absolute;top:8px;right:12px;background:rgba(46,213,115,0.15);border:1px solid rgba(46,213,115,0.3);border-radius:20px;padding:3px 10px;font-size:0.7rem;font-weight:600;color:var(--green);animation:toastIn 0.2s ease,toastOut 0.3s ease 1.2s forwards;pointer-events:none;}
@keyframes toastIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0}}
.picks-progress{margin-bottom:1.25rem;}
.progress-labels{display:flex;justify-content:space-between;font-size:0.75rem;color:var(--muted);margin-bottom:6px;}
.progress-labels strong{color:var(--text);}
.progress-track{height:4px;background:var(--surface2);border-radius:4px;overflow:hidden;}
.progress-fill{height:100%;background:var(--accent);border-radius:4px;transition:width 0.4s ease;}
.rank-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:8px;display:flex;align-items:center;gap:1rem;}
.rank-card.me{border-color:rgba(232,255,71,0.4);background:rgba(232,255,71,0.03);}
.rank-pos{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;width:36px;text-align:center;color:var(--muted);}
.rank-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.9rem;flex-shrink:0;}
.rank-info{flex:1;}
.rank-name{font-weight:600;font-size:0.95rem;}
.rank-sub{font-size:0.75rem;color:var(--muted);margin-top:2px;}
.rank-points{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--accent);}
.pts-label{font-size:0.7rem;color:var(--muted);text-align:right;}
.admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:600px){.admin-grid{grid-template-columns:1fr;}}
.admin-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;}
.admin-card-title{font-size:0.8rem;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);margin-bottom:10px;}
.admin-teams{display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.admin-team-name{font-weight:600;font-size:0.85rem;}
.admin-vs{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--muted);}
.score-inputs{display:flex;align-items:center;gap:8px;}
.score-input{width:50px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:1.1rem;font-weight:600;padding:7px;text-align:center;outline:none;}
.knockout-score-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:8px;}
.ko-team-mini{display:flex;align-items:center;gap:6px;font-size:0.82rem;font-weight:600;min-width:70px;}
.ko-team-mini .team-flag{font-size:1.1rem;}
.score-input:focus{border-color:var(--accent);}
.score-dash{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:var(--muted);}
.btn-sm{padding:7px 14px;border-radius:7px;border:none;font-family:'DM Sans',sans-serif;font-size:0.8rem;font-weight:600;cursor:pointer;transition:all 0.2s;background:var(--accent);color:#0a0e1a;}
.btn-sm:hover{background:#d4eb00;}
.btn-sm:disabled{opacity:0.5;cursor:not-allowed;}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:1rem;color:var(--muted);}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:2px;margin-bottom:1.25rem;}
.tab-section{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:10px;}
.empty-state{text-align:center;padding:3rem;color:var(--muted);}
.refresh-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:0.75rem;padding:6px 12px;border-radius:8px;cursor:pointer;transition:all 0.2s;}
.refresh-btn:hover{color:var(--text);border-color:var(--muted);}
.group-label{font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--accent2);margin-bottom:8px;margin-top:16px;display:flex;align-items:center;justify-content:space-between;}
.group-label-btn{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:2px 8px;font-size:0.6rem;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;}
.group-label-btn:hover{color:var(--text);border-color:var(--muted);}

.pred-banner{background:rgba(0,212,255,0.07);border:1px solid rgba(0,212,255,0.2);border-radius:10px;padding:12px 14px;font-size:0.82rem;color:var(--text);margin-bottom:1.25rem;line-height:1.5;}
.pred-group-title{font-family:'Bebas Neue',sans-serif;font-size:1.15rem;letter-spacing:1.5px;color:var(--accent2);margin:1.5rem 0 0.7rem;}
.info-btn{background:var(--surface2);border:1px solid var(--border);border-radius:50%;width:32px;height:32px;font-size:0.95rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
.links-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1.25rem;}
.links-row-item{flex:1;min-width:160px;text-align:center;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:0.78rem;font-weight:600;color:var(--accent2);text-decoration:none;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:400;display:flex;align-items:center;justify-content:center;padding:1.25rem;}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.5rem;max-width:480px;width:100%;max-height:85vh;overflow-y:auto;}
.modal-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:1px;}
.modal-x{background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;line-height:1;padding:0;}
.modal-sub{color:var(--muted);font-size:0.85rem;line-height:1.55;margin-top:0.75rem;}
.intro-pred-row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.intro-pred-label{font-size:0.85rem;font-weight:600;}
.intro-pred-desc{font-size:0.72rem;color:var(--muted);margin-top:1px;}
.intro-link{display:block;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:0.82rem;font-weight:600;color:var(--accent2);text-decoration:none;margin-bottom:8px;}
.pred-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;}
.pred-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:10px;}
.pred-label{font-weight:600;font-size:0.92rem;}
.pred-pts{background:rgba(232,255,71,0.1);border:1px solid rgba(232,255,71,0.2);border-radius:20px;padding:2px 10px;font-size:0.72rem;font-weight:600;color:var(--accent);white-space:nowrap;}
.pred-select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.9rem;padding:9px 12px;outline:none;cursor:pointer;}
.pred-select:focus{border-color:var(--accent);}
.pred-select:disabled{opacity:0.6;cursor:not-allowed;}
.player-picker{display:flex;gap:8px;}
.player-picker .pred-select{flex:1;min-width:0;}
@media(max-width:600px){.player-picker{flex-direction:column;}}
.pred-saved{font-size:0.72rem;color:var(--green);margin-top:6px;}
.group-badge{background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.25);border-radius:20px;padding:4px 12px;font-size:0.73rem;font-weight:600;color:var(--accent2);white-space:nowrap;max-width:180px;overflow:hidden;text-overflow:ellipsis;display:inline-block;vertical-align:middle;}
.account-btn{display:flex;align-items:center;gap:4px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 8px 3px 4px;cursor:pointer;transition:border-color 0.15s;}
.account-btn:hover{border-color:var(--accent);}
.account-avatar{width:26px;height:26px;border-radius:50%;color:#0a0e1a;font-weight:700;font-size:0.68rem;display:flex;align-items:center;justify-content:center;}
.account-caret{color:var(--muted);font-size:0.7rem;}
.account-menu{position:absolute;right:0;top:calc(100% + 8px);background:var(--surface);border:1px solid var(--border);border-radius:12px;min-width:215px;padding:6px;z-index:201;box-shadow:0 12px 32px rgba(0,0,0,0.5);}
.account-menu-divider{height:1px;background:var(--border);margin:6px 8px;}
.rules-banner{background:rgba(0,212,255,0.05);border:1px solid rgba(0,212,255,0.18);border-radius:12px;margin-bottom:1rem;overflow:hidden;}
.rules-head{width:100%;display:flex;justify-content:space-between;align-items:center;background:none;border:none;color:var(--accent2);font-family:'DM Sans',sans-serif;font-weight:700;font-size:0.85rem;padding:10px 16px;cursor:pointer;letter-spacing:0.3px;}
.rules-list{list-style:none;margin:0;padding:0 16px 12px;}
.rules-list li{font-size:0.8rem;color:#cdd6e2;padding:3px 0;line-height:1.45;}
.meta-link{background:none;border:none;color:var(--accent2);font-family:'DM Sans',sans-serif;font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;cursor:pointer;padding:0;text-decoration:underline;text-underline-offset:3px;}
.no-pick{background:rgba(255,71,87,0.08);border:1px solid rgba(255,71,87,0.22);border-radius:8px;padding:7px 12px;font-size:0.78rem;color:#ff8a94;font-weight:600;margin-bottom:10px;text-align:center;}
.mv-badge{display:inline-block;font-size:0.7rem;font-weight:700;padding:2px 7px;border-radius:20px;letter-spacing:0.3px;}
.mv-up{background:rgba(16,185,129,0.15);color:#10b981;}
.mv-down{background:rgba(255,71,87,0.15);color:#ff4757;}
.mv-same{background:rgba(139,151,168,0.12);color:var(--muted);}
.day-group{margin-bottom:1rem;}
.day-head{width:100%;display:flex;justify-content:space-between;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-weight:700;font-size:0.85rem;padding:11px 16px;cursor:pointer;margin-bottom:10px;letter-spacing:0.3px;}
.day-group.past .day-head{background:transparent;color:var(--muted);font-weight:600;}
.day-head-right{display:flex;align-items:center;gap:10px;}
.day-count{font-size:0.72rem;background:rgba(232,255,71,0.12);color:var(--accent);padding:2px 9px;border-radius:20px;font-weight:700;}
.day-caret{font-size:0.65rem;color:var(--muted);}
.check-row{display:flex;align-items:flex-start;gap:10px;font-size:0.82rem;color:var(--muted);margin-bottom:10px;cursor:pointer;line-height:1.4;text-transform:none;letter-spacing:0;}
.suggest-options{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
.suggest-opt{flex:1;min-width:90px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 10px;font-size:0.8rem;font-weight:600;color:var(--text);cursor:pointer;text-align:center;font-family:'DM Sans',sans-serif;}
.suggest-opt.selected{background:rgba(232,255,71,0.15);border-color:var(--accent);color:var(--accent);}
.check-row input{margin-top:2px;width:16px;height:16px;flex:0 0 auto;accent-color:var(--accent);cursor:pointer;}
.check-row a{color:var(--accent);text-decoration:underline;}
.account-menu-head{font-size:0.82rem;color:var(--text);font-weight:700;padding:8px 12px 8px;border-bottom:1px solid var(--border);margin-bottom:4px;}
.account-menu-item{display:block;width:100%;text-align:left;background:none;border:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.85rem;padding:10px 12px;border-radius:8px;cursor:pointer;transition:background 0.15s;}
.account-menu-item:hover{background:var(--surface2);}
.account-menu-item.danger{color:var(--red);}
.account-menu-item.danger:hover{background:rgba(255,71,87,0.12);}
@media(max-width:600px){
  .header{padding:0 1rem;}
  .header-inner{flex-wrap:wrap;height:auto;padding:10px 0;gap:8px;}
  .logo-row{order:1;}
  .logo{font-size:1.1rem;line-height:1;white-space:nowrap;}
  .more-trivias-btn{font-size:0.68rem;padding:5px 10px;}
  .user-bar{order:2;margin-left:auto;}
  .nav{order:3;width:100%;overflow-x:auto;flex-wrap:nowrap;gap:4px;padding-bottom:2px;-webkit-overflow-scrolling:touch;}
  .nav::-webkit-scrollbar{display:none;}
  .nav-btn{flex:0 0 auto;white-space:nowrap;padding:7px 14px;}
}
@media(max-width:600px){.group-badge{font-size:0.65rem;padding:3px 8px;max-width:110px;}}
@media(max-width:420px){.more-trivias-btn span.full-label{display:none;}}

function isLocked(mt){return new Date()>=new Date(new Date(mt).getTime()-60*60*1000);}
function getTimeUntilLock(mt){return new Date(new Date(mt).getTime()-60*60*1000)-new Date();}
function isClosingSoon(mt){const d=getTimeUntilLock(mt);return d>0&&d<6*60*60*1000;}
function formatMatchTime(mt){const d=new Date(mt);return d.toLocaleDateString('es-MX',{weekday:'short',day:'numeric',month:'short',timeZone:'America/Mexico_City'})+' · '+d.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit',timeZone:'America/Mexico_City'});}
function getAvatarColor(name){const s=name||'?';const c=['#e8ff47','#00d4ff','#ff6b9d','#7c3aed','#f59e0b','#10b981'];let h=0;for(let x of s)h=(h*31+x.charCodeAt(0))%c.length;return c[h];}
function getInitials(name){return (name||'?').split(' ').map(w=>w[0]||'').join('').toUpperCase().slice(0,2)||'?';}
function calcPointsKnockout(pick,match){
  if(match.home_score==null||match.away_score==null||!match.winner)return 0;
  let pts=0;
  if(pick.result&&pick.result===match.winner)pts+=3;
  if(pick.home_goals!=null&&pick.away_goals!=null&&pick.home_goals===match.home_score&&pick.away_goals===match.away_score)pts+=2;
  if(pick.home_goals!=null&&pick.away_goals!=null&&(pick.home_goals+pick.away_goals)===(match.home_score+match.away_score))pts+=1;
  return pts;
}
function calcPoints(pick,match){
  if(!pick)return 0;
  if(match.stage!=='Grupos')return calcPointsKnockout(pick,match);
  if(match.home_score==null||match.away_score==null)return 0;
  let pts=0;
  const actual=match.home_score>match.away_score?'home':match.away_score>match.home_score?'away':'draw';
  if(pick.result===actual)pts+=3;
  const total=match.home_score+match.away_score;
  const ag=total>=4?4:total;
  if(pick.goals===ag)pts+=1;
  return pts;
}

function calcPredictionPoints(pred,results){
  if(!pred||!results)return 0;
  let pts=0;
  PRED_DEFS.forEach(d=>{const c=results[d.key];if(c&&pred[d.key]&&pred[d.key]===c)pts+=d.pts;});
  return pts;
}
function calcGroupStandings(group,matches){
  const gm=matches.filter(m=>m.group_name===group&&m.home_team!=='TBD');
  const teams={};
  gm.forEach(m=>{
    if(!teams[m.home_team])teams[m.home_team]={name:m.home_team,pj:0,g:0,e:0,p:0,gf:0,gc:0,pts:0};
    if(!teams[m.away_team])teams[m.away_team]={name:m.away_team,pj:0,g:0,e:0,p:0,gf:0,gc:0,pts:0};
    if(m.home_score!=null&&m.away_score!=null){
      const hs=m.home_score,as=m.away_score;
      teams[m.home_team].pj++;teams[m.away_team].pj++;
      teams[m.home_team].gf+=hs;teams[m.home_team].gc+=as;
      teams[m.away_team].gf+=as;teams[m.away_team].gc+=hs;
      if(hs>as){teams[m.home_team].g++;teams[m.home_team].pts+=3;teams[m.away_team].p++;}
      else if(as>hs){teams[m.away_team].g++;teams[m.away_team].pts+=3;teams[m.home_team].p++;}
      else{teams[m.home_team].e++;teams[m.home_team].pts++;teams[m.away_team].e++;teams[m.away_team].pts++;}
    }
  });
  return Object.values(teams).sort((a,b)=>{
    if(b.pts!==a.pts)return b.pts-a.pts;
    const da=a.gf-a.gc,db=b.gf-b.gc;
    if(db!==da)return db-da;
    return b.gf-a.gf;
  });
}

function Countdown({matchTime}){
  const[diff,setDiff]=useState(getTimeUntilLock(matchTime));
  useEffect(()=>{const t=setInterval(()=>setDiff(getTimeUntilLock(matchTime)),1000);return()=>clearInterval(t);},[matchTime]);
  if(diff<=0)return null;
  const s=Math.floor(diff/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  const pad=n=>String(n).padStart(2,'0');
  return(
    <div className="countdown-bar">
      <span className="countdown-label">⏳ Cierra en</span>
      <div className="countdown-digits">
        {h>0&&<><div className="cd-block"><div className="cd-num">{pad(h)}</div><div className="cd-unit">hrs</div></div><span className="cd-sep">:</span></>}
        <div className="cd-block"><div className="cd-num">{pad(m)}</div><div className="cd-unit">min</div></div>
        <span className="cd-sep">:</span>
        <div className="cd-block"><div className="cd-num">{pad(sec)}</div><div className="cd-unit">seg</div></div>
      </div>
    </div>
  );
}

function DeadlineCountdown({deadline,label}){
  const getDiff=()=>new Date(deadline)-new Date();
  const[diff,setDiff]=useState(getDiff());
  useEffect(()=>{const t=setInterval(()=>setDiff(getDiff()),1000);return()=>clearInterval(t);},[deadline]);
  if(diff<=0)return null;
  const totalH=Math.floor(diff/3600000);
  const days=Math.floor(totalH/24),h=totalH%24;
  const s=Math.floor(diff/1000),m=Math.floor((s%3600)/60),sec=s%60;
  const pad=n=>String(n).padStart(2,'0');
  return(
    <div className="countdown-bar">
      <span className="countdown-label">⏳ {label||'Cierra en'}</span>
      <div className="countdown-digits">
        {days>0&&<><div className="cd-block"><div className="cd-num">{days}</div><div className="cd-unit">días</div></div><span className="cd-sep">:</span></>}
        <div className="cd-block"><div className="cd-num">{pad(h)}</div><div className="cd-unit">hrs</div></div>
        <span className="cd-sep">:</span>
        <div className="cd-block"><div className="cd-num">{pad(m)}</div><div className="cd-unit">min</div></div>
        <span className="cd-sep">:</span>
        <div className="cd-block"><div className="cd-num">{pad(sec)}</div><div className="cd-unit">seg</div></div>
      </div>
    </div>
  );
}

      return;
    }
    if(data){setPicks(prev=>({...prev,[matchId]:data}));}
    setJustSaved(`${matchId}-multi`);
  },[user]);

  const savePick=useCallback(async function(matchId,field,value){
    if(!user)return;
    const existing=picksRef.current[matchId]||{};
    const optimistic={...existing,user_id:user.id,match_id:matchId,[field]:value,updated_at:new Date().toISOString()};
    setPicks(prev=>({...prev,[matchId]:optimistic}));
    const payload={...existing,user_id:user.id,match_id:matchId,[field]:value};
    const{data,error}=await sb.from('picks').upsert(payload,{onConflict:'user_id,match_id'}).select().single();
    if(error){
      setPicks(prev=>({...prev,[matchId]:existing}));
      alert('⚠️ Tu pick NO se guardó ('+(error.message||'error de conexión')+').\n\nRevisa tu conexión a internet e inténtalo de nuevo. Verifica que tu selección siga marcada.');
      return;
    }
    if(data){setPicks(prev=>({...prev,[matchId]:data}));}
    setJustSaved(`${matchId}-${field}`);
    setTimeout(()=>setJustSaved(null),1500);
  },[user]);

  async function saveAdminScore(matchId){
    const s=adminScores[matchId];if(!s)return;
    const hs=parseInt(s.home,10),as=parseInt(s.away,10);
    if(!Number.isFinite(hs)||!Number.isFinite(as)||hs<0||as<0){alert('Ingresa marcadores válidos (números mayores o iguales a 0).');return;}
    const match=matches.find(m=>m.id===matchId);
    let winner=null;
    if(match&&match.stage!=='Grupos'){
      if(hs===as){
        if(!s.winner){alert('Es empate en 120 min — elige quién avanza por penales antes de guardar.');return;}
        winner=s.winner;
      }else{
        winner=hs>as?'home':'away';
      }
    }
    setAdminSaving(matchId);
    // Snapshot vía SQL para que no dependa del estado del cliente
    await sb.rpc('take_ranking_snapshot',{p_match_id:matchId}).then(({error})=>{
      if(error)console.warn('Snapshot warning:',error.message);
    });
    const updatePayload={home_score:hs,away_score:as,status:'finished'};
    if(winner)updatePayload.winner=winner;
    await sb.from('matches').update(updatePayload).eq('id',matchId);
    setMatches(prev=>prev.map(m=>m.id===matchId?{...m,...updatePayload}:m));
    await loadRankings();
    setAdminSaving(null);
  }

  function scrollToStandings(group){
    onGroupChange(group);
    setTimeout(()=>{
      const el=document.getElementById('standings-sidebar');
      if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
    },50);
  }

  function onGroupChange(g){setSelectedGroup(g);}

  const[menuOpen,setMenuOpen]=useState(false);
  function copyInviteCode(){
    if(!currentGroup)return;
    const link=`https://www.wc26pool.com/?join=${currentGroup.invite_code}`;
    const msg=`Únete a mi trivia mundialista "${currentGroup.name}" del Mundial 2026:\n\n${link}\n\n(o entra a www.wc26pool.com y usa el código ${currentGroup.invite_code})`;
    if(navigator.clipboard){navigator.clipboard.writeText(link).then(()=>alert('¡Enlace copiado! Compártelo con tu grupo:\n\n'+link)).catch(()=>alert(msg));}
    else{alert(msg);}
  }
  async function saveName(){
    const name=nameInput.trim();
    if(!name){return;}
    if(name===profile.username){setEditingName(false);return;}
    setSavingName(true);
    const{data,error}=await sb.from('profiles').update({username:name}).eq('id',user.id).select().maybeSingle();
    setSavingName(false);
    if(error){alert('No se pudo cambiar el nombre: '+error.message);return;}
    if(data)setProfile(data);
    setEditingName(false);
  }
  async function deleteAccount(){
    setMenuOpen(false);
    const ownsGroup=myGroups.some(g=>g.owner_id===user.id);
    const warn=ownsGroup
      ?'⚠️ Vas a ELIMINAR tu cuenta de forma PERMANENTE.\n\nComo creaste uno o más grupos, esos grupos y sus rankings se borrarán para TODOS sus miembros.\n\nEsto NO es cerrar sesión. NO se puede deshacer.'
      :'⚠️ Vas a ELIMINAR tu cuenta de forma PERMANENTE, junto con tus picks y predicciones.\n\nEsto NO es cerrar sesión (si solo quieres salir, usa "Cerrar sesión"). NO se puede deshacer.';
    if(!window.confirm(warn))return;
    const typed=window.prompt('Para confirmar que quieres eliminar tu cuenta, escribe la palabra:  ELIMINAR');
    if(!typed||typed.trim().toUpperCase()!=='ELIMINAR'){alert('Cancelado. Tu cuenta NO se eliminó.');return;}
    try{
      const{data:{session}}=await sb.auth.getSession();
      const res=await fetch('/api/delete-account',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({accessToken:session&&session.access_token})});
      const j=await res.json();
      if(j.error)throw new Error(j.error);
      alert('Tu cuenta fue eliminada. ¡Gracias por participar!');
      await sb.auth.signOut();
      window.location.reload();
    }catch(e){
      alert('No se pudo eliminar la cuenta: '+e.message);
    }
  }

  if(recoveryMode)return<ResetPasswordScreen onDone={()=>{setRecoveryMode(false);window.location.hash='';window.location.reload();}}/>;
  if(loading)return<div className="app"><div className="loading"><div className="spinner"/><span>Cargando trivia...</span></div></div>;
  if(!user||!profile)return<AuthScreen onAuth={handleAuth} authMode={authMode} setAuthMode={setAuthMode} loading={authLoading} error={authError} registerSuccess={registerSuccess}/>;
  if(showOnboarding)return<OnboardingScreen username={profile.username} onDone={()=>setShowOnboarding(false)}/>;

  const isAdmin=user.email==='admin@quiniela2026.com'||profile.username==='admin';
  if(paymentProcessing||paymentError)return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)',padding:'1.5rem'}}>
      <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:16,padding:'2.5rem',width:'100%',maxWidth:400,textAlign:'center'}}>
        {paymentProcessing
          ?<><div className='spinner' style={{margin:'0 auto 1.5rem'}}/><div style={{fontFamily:'Bebas Neue,sans-serif',fontSize:'1.5rem',letterSpacing:2,marginBottom:8}}>PROCESANDO PAGO</div><p style={{color:'var(--muted)',fontSize:'0.9rem'}}>Verificando con Stripe, no cierres esta ventana...</p></>
          :<><div style={{fontSize:'3rem',marginBottom:16}}>⚠️</div><div style={{fontFamily:'Bebas Neue,sans-serif',fontSize:'1.5rem',letterSpacing:2,marginBottom:8}}>ERROR EN EL PAGO</div><p style={{color:'var(--muted)',fontSize:'0.9rem',marginBottom:'1.5rem'}}>{paymentError}</p><button onClick={()=>setPaymentError('')} className='btn btn-primary'>Volver</button></>
        }
      </div>
    </div>
  );
  if(!currentGroup&&!isAdmin)return<GroupSelectionScreen user={user} profile={profile} myGroups={myGroups} joinCode={joinCode} onJoinCodeUsed={()=>setJoinCode(null)} onGroupSelected={async(g)=>{await loadGroupMembers(g.id);setCurrentGroup(g);}}/>;
  const myPoints=Object.values(picks).reduce((acc,pick)=>{const match=matches.find(m=>m.id===pick.match_id);if(!match||match.home_score==null)return acc;return acc+calcPoints(pick,match);},0);
  const myPredPoints=calcPredictionPoints(prediction,predResults);
  const PRED_DEADLINE='2026-06-28T19:00:00+00:00'; // 28 jun 2026, 1:00 PM CDMX (1h antes del primer partido de 16avos)
  const predLocked=Date.now()>=new Date(PRED_DEADLINE).getTime();

  return(
    <div className="app">
      <header className="header">
        <div className="header-inner">
          <div className="logo-row">
            <div className="logo">TRIVIA <span>MUNDIALISTA</span></div>
            <button className="more-trivias-btn" onClick={()=>setShowSuggestions(true)}>💡 Más trivias</button>
          </div>
          <nav className="nav">
            <button className={`nav-btn ${tab==='picks'?'active':''}`} onClick={()=>setTab('picks')}>Partidos</button>
            <button className={`nav-btn ${tab==='rankings'?'active':''}`} onClick={()=>{setTab('rankings');loadRankings();}}>Ranking</button>
            <button className={`nav-btn ${tab==='predicciones'?'active':''}`} onClick={()=>setTab('predicciones')}>Predicciones</button>
            {isAdmin&&<button className={`nav-btn ${tab==='admin'?'active':''}`} onClick={()=>setTab('admin')}>Admin</button>}
          </nav>
          <div className="user-bar">
            {currentGroup&&<span className="group-badge" title={currentGroup.name}>{currentGroup.name}</span>}
            <span className="points-pill">⚽ {myPoints+myPredPoints} pts</span>
            <div style={{position:'relative'}}>
              <button className="account-btn" onClick={()=>setMenuOpen(o=>!o)}>
                <span className="account-avatar" style={{background:getAvatarColor(profile.username)}}>{getInitials(profile.username)}</span>
                <span className="account-caret">▾</span>
              </button>
              {menuOpen&&<>
                <div onClick={()=>setMenuOpen(false)} style={{position:'fixed',inset:0,zIndex:200}}/>
                <div className="account-menu">
                  <div className="account-menu-head">{profile.username}{currentGroup&&<div style={{fontSize:'0.7rem',color:'var(--accent2)',fontWeight:600,marginTop:2}}>{currentGroup.name}</div>}</div>
                  <button className="account-menu-item" onClick={()=>{setNameInput(profile.username);setEditingName(true);setMenuOpen(false);}}>✏️ Cambiar mi nombre</button>
                  {currentGroup&&user.id===currentGroup.owner_id&&<button className="account-menu-item" onClick={()=>{copyInviteCode();setMenuOpen(false);}}>🔗 Copiar enlace de invitación</button>}
                  <button className="account-menu-item" onClick={()=>{setCurrentGroup(null);setGroupMembers([]);setMenuOpen(false);}}>🔄 Mis grupos / unirme a otro</button>
                  <button className="account-menu-item" onClick={()=>{setShowSuggestions(true);setMenuOpen(false);}}>💡 Sugerencias / Más trivias</button>
                  <button className="account-menu-item" onClick={async()=>{setMenuOpen(false);try{const{error}=await sb.auth.signOut();if(error)alert('Error al cerrar sesión: '+error.message);}catch(e){alert('Error al cerrar sesión: '+e.message);}}}>↩️ Cerrar sesión</button>
                  <div className="account-menu-divider"/>
                  <button className="account-menu-item danger" onClick={deleteAccount}>🗑️ Eliminar mi cuenta (permanente)</button>

            <div className="field"><label>Tu nombre</label>

            </div>
            <p style={{color:'var(--muted)',fontSize:'0.78rem',marginBottom:'1rem'}}>Así te verán los demás en el ranking de tu grupo.</p>

        {tab==='admin'&&isAdmin&&<AdminTab matches={matches} adminScores={adminScores} setAdminScores={setAdminScores} saveAdminScore={saveAdminScore} adminSaving={adminSaving} predResults={predResults} savePredResult={savePredResult}/>}
      </main>
      <LegalFooter/>

  );
}

function GroupSelectionScreen({user,profile,myGroups,joinCode,onGroupSelected,onJoinCodeUsed}){
  const[mode,setMode]=useState('select');
  const[groupName,setGroupName]=useState('');
  const[inviteCode,setInviteCode]=useState(joinCode||'');
  const[promoCode,setPromoCode]=useState('');
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState('');
  const[autoJoining,setAutoJoining]=useState(!!joinCode);
  function handleGroupSelected(g){onJoinCodeUsed&&onJoinCodeUsed();onGroupSelected(g);}
  useEffect(()=>{
    if(joinCode){handleJoin(joinCode).finally(()=>setAutoJoining(false));}
  // eslint-disable-next-line
  },[]);
  async function handleCreate(){
    if(!groupName.trim())return;
    setLoading(true);setError('');
    try{
      // Con código promocional: el servidor valida el código secreto y crea el grupo gratis.
      if(promoCode.trim()){
        const fr=await fetch('/api/create-free-group',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({groupName:groupName.trim(),userId:user.id,promoCode:promoCode.trim()})});
        const{group,error:freeErr}=await fr.json();
        if(freeErr)throw new Error(freeErr);
        handleGroupSelected(group);
        return;
      }
      localStorage.setItem('wc26_pending_group',JSON.stringify({groupName:groupName.trim(),userId:user.id}));
      const res=await fetch('/api/create-checkout',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({groupName:groupName.trim(),userId:user.id})});
      const{url,error:apiErr}=await res.json();
      if(apiErr)throw new Error(apiErr);
      window.location.href=url;
    }catch(e){setError(e.message||'Error de conexión. Intenta de nuevo.');setLoading(false);}
  }
  async function handleJoin(codeArg){
    const code=((typeof codeArg==='string'?codeArg:inviteCode)||'').toUpperCase().trim();
    if(!code)return;
    setLoading(true);setError('');
    const{data:group}=await sb.from('groups').select('*').eq('invite_code',code).eq('status','active').maybeSingle();
    if(!group){setError('Código inválido. Verifica el enlace o el código con quien te invitó.');setLoading(false);return;}
    const{data:existing}=await sb.from('group_members').select('*').eq('group_id',group.id).eq('user_id',user.id).maybeSingle();
    if(!existing){
      const{error:joinErr}=await sb.from('group_members').insert({group_id:group.id,user_id:user.id});
      if(joinErr){setError(joinErr.message);setLoading(false);return;}
    }
    handleGroupSelected(group);
  }
  const btnBase={flex:1,padding:12,borderRadius:8,border:'1px solid var(--border)',background:'var(--surface2)',color:'var(--text)',fontFamily:'DM Sans,sans-serif',fontSize:'0.95rem',fontWeight:600,cursor:'pointer'};
  if(autoJoining)return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)',padding:'1.5rem'}}>
      <div style={{textAlign:'center'}}><div className='spinner' style={{margin:'0 auto 1rem'}}/><div style={{fontFamily:'Bebas Neue,sans-serif',fontSize:'1.3rem',letterSpacing:1.5}}>UNIÉNDOTE AL GRUPO...</div></div>
    </div>
  );
  return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)',padding:'1.5rem'}}>
      <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:16,padding:'2.5rem',width:'100%',maxWidth:440}}>
        <div style={{fontFamily:'Bebas Neue,sans-serif',fontSize:'2rem',letterSpacing:3,marginBottom:4}}>TRIVIA <span style={{color:'var(--accent2)'}}>MUNDIALISTA</span></div>
        <p style={{color:'var(--muted)',fontSize:'0.9rem',marginBottom:'1.75rem'}}>Hola, <strong style={{color:'var(--text)'}}>{profile.username}</strong>. ¿A qué grupo entras?</p>
        {error&&<div className='error-msg'>{error}</div>}
        {mode==='select'&&<>
          {myGroups.length>0&&<div style={{marginBottom:'1.25rem'}}>
            {myGroups.map(g=>(
              <button key={g.id} onClick={()=>handleGroupSelected(g)}
                style={{width:'100%',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:10,padding:'14px 16px',marginBottom:8,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'space-between',color:'var(--text)',fontFamily:'DM Sans,sans-serif',transition:'all 0.15s'}}
                onMouseOver={e=>{e.currentTarget.style.borderColor='var(--accent)';e.currentTarget.style.background='rgba(232,255,71,0.04)';}}
                onMouseOut={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.background='var(--surface2)';}}>
                <span style={{fontWeight:600,fontSize:'0.95rem'}}>{g.name}</span>
                <span style={{color:'var(--accent)',fontWeight:700,fontSize:'0.85rem'}}>Entrar →</span>
              </button>
            ))}
          </div>}
          <div style={{display:'flex',gap:8}}>
            <button className='btn btn-primary' style={{flex:1}} onClick={()=>setMode('create')}>+ Crear grupo</button>
            <button style={btnBase} onClick={()=>setMode('join')}>Unirme</button>
          </div>
        </>}
        {mode==='create'&&<>
          <div className='field'><label>Nombre del grupo</label>
            <input value={groupName} onChange={e=>setGroupName(e.target.value)} placeholder='ej. Los Compas del Trabajo' maxLength={50} onKeyDown={e=>e.key==='Enter'&&handleCreate()}/>
          </div>
          <div className='field'><label>Código promocional</label>
            <input value={promoCode} onChange={e=>setPromoCode(e.target.value)} placeholder='Pídelo al organizador' maxLength={40} onKeyDown={e=>e.key==='Enter'&&handleCreate()}/>
          </div>
          <div style={{background:promoCode.trim()?'rgba(16,185,129,0.07)':'rgba(0,212,255,0.06)',border:'1px solid '+(promoCode.trim()?'rgba(16,185,129,0.25)':'rgba(0,212,255,0.2)'),borderRadius:8,padding:'10px 14px',fontSize:'0.82rem',marginBottom:'1rem',lineHeight:1.5}}>
            {promoCode.trim()
              ?<>🎟️ Con un código promocional válido, tu grupo se crea <strong>gratis</strong>.</>
              :<>🚧 El <strong>pago con tarjeta está en construcción</strong>. Por ahora, crea tu grupo con un código promocional. ¡Pronto podrás crear grupos con pago!</>}
          </div>
          <button className='btn btn-primary' disabled={loading||!groupName.trim()||!promoCode.trim()} onClick={handleCreate}>
            {loading?'Creando grupo...':(promoCode.trim()?'Crear grupo gratis →':'Pago con tarjeta (próximamente)')}
          </button>
          <p className='auth-toggle'><a onClick={()=>{setMode('select');setError('');setPromoCode('');}}>← Volver</a></p>
        </>}
        {mode==='join'&&<>
          <div className='field'><label>Código de invitación</label>
            <input value={inviteCode} onChange={e=>setInviteCode(e.target.value.toUpperCase())} placeholder='ej. ABC12345' maxLength={10} style={{letterSpacing:2,textTransform:'uppercase'}} onKeyDown={e=>e.key==='Enter'&&handleJoin()}/>
          </div>
          <button className='btn btn-primary' disabled={loading||!inviteCode.trim()} onClick={()=>handleJoin()}>
            {loading?'Verificando...':'Unirme al grupo'}
          </button>
          <p className='auth-toggle'><a onClick={()=>{setMode('select');setError('');}}>← Volver</a></p>
        </>}
        <button onClick={()=>sb.auth.signOut()} style={{display:'block',width:'100%',marginTop:'1.5rem',padding:6,borderRadius:6,border:'none',background:'none',color:'var(--muted)',fontFamily:'DM Sans,sans-serif',fontSize:'0.72rem',cursor:'pointer',opacity:0.7}}>
          Cerrar sesión ({profile.username})
        </button>
      </div>
    </div>
  );
}

function ResetPasswordScreen({onDone}){
  const[newPassword,setNewPassword]=useState('');
  const[confirmPassword,setConfirmPassword]=useState('');
  const[loading,setLoading]=useState(false);
  const[msg,setMsg]=useState('');
  async function handleReset(e){
    e.preventDefault();
    if(newPassword!==confirmPassword){setMsg('Las contraseñas no coinciden.');return;}
    setLoading(true);setMsg('');
    const{error}=await sb.auth.updateUser({password:newPassword});
    if(error)setMsg('Error: '+error.message);
    else{setMsg('✅ ¡Contraseña actualizada! Redirigiendo...');setTimeout(onDone,1800);}
    setLoading(false);
  }
  return(
    <div className="auth-wrap"><div className="auth-card">
      <div className="auth-title">NUEVA<br/><span style={{color:'var(--accent2)'}}>CONTRASEÑA</span></div>
      <p className="auth-sub">Elige una nueva contraseña para tu cuenta.</p>
      {msg&&<div className={msg.startsWith('✅')?'success-msg':'error-msg'}>{msg}</div>}
      {!msg.startsWith('✅')&&<form onSubmit={handleReset}>
        <div className="field"><label>Nueva contraseña</label><input type="password" value={newPassword} onChange={e=>setNewPassword(e.target.value)} placeholder="••••••••" required minLength={6} autoComplete="new-password"/></div>
        <div className="field"><label>Confirmar contraseña</label><input type="password" value={confirmPassword} onChange={e=>setConfirmPassword(e.target.value)} placeholder="••••••••" required minLength={6} autoComplete="new-password"/></div>
        <button className="btn btn-primary" type="submit" disabled={loading}>{loading?'Guardando...':'Guardar contraseña'}</button>
      </form>}
    </div></div>
  );
}

function SuggestionsModal({onClose,userId}){
  const[improvement,setImprovement]=useState('');
  const[wantsMore,setWantsMore]=useState('');
  const[willingToPay,setWillingToPay]=useState('');
  const[contact,setContact]=useState('');
  const[saving,setSaving]=useState(false);

        </div>

        <div className="field">

      </div>
    </div>
  );
}

function PicksTab({matches,picks,savePick,savePickMulti,justSaved,stageFilter,setStageFilter,onGroupChange,scrollToStandings}){
  const filtered=matches.filter(m=>m.stage===stageFilter);
  const isPickComplete=(m)=>{
    const p=picks[m.id];
    if(!p)return false;
    if(m.stage!=='Grupos')return p.home_goals!=null&&p.away_goals!=null&&(p.home_goals!==p.away_goals||p.result);
    return p.result&&p.goals!=null;
  };
  const pickedCount=filtered.filter(isPickComplete).length;
  const pct=filtered.length>0?Math.round((pickedCount/filtered.length)*100):0;
  // Día de hoy en CDMX en formato ISO ordenable (aaaa-mm-dd), recalculado en cada render
  const todayStr=new Date().toLocaleDateString('en-CA',{timeZone:'America/Mexico_City'});
  const byDate=filtered.reduce((acc,m)=>{
    const dObj=new Date(m.match_time);
    const d=dObj.toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long'});
    const key=d.charAt(0).toUpperCase()+d.slice(1);
    if(!acc[key])acc[key]={matches:[],iso:dObj.toLocaleDateString('en-CA',{timeZone:'America/Mexico_City'})};
    acc[key].matches.push(m);return acc;
  },{});
  const[showKnockoutIntro,setShowKnockoutIntro]=useState(true); // siempre aparece al entrar a Partidos
  return(
    <div>
      {showKnockoutIntro&&<KnockoutIntroModal onClose={()=>setShowKnockoutIntro(false)}/>}
      <div className="tab-section"><div className="section-title">TUS PICKS</div></div>
      <RulesBanner/>
      <div className="picks-progress">
        <div className="progress-labels"><span>{pickedCount} de {filtered.length} partidos elegidos</span><strong>{pct}%</strong></div>
        <div className="progress-track"><div className="progress-fill" style={{width:pct+'%'}}/></div>
      </div>
      <div className="stage-filter">{STAGES.map(s=><button key={s} className={`stage-btn ${stageFilter===s?'active':''}`} onClick={()=>setStageFilter(s)}>{s}</button>)}</div>
      {filtered.length===0
        ?<div className="empty-state">No hay partidos en esta fase aún</div>
        :Object.keys(byDate).map(d=>{
          const isPast=byDate[d].iso<todayStr;
          return<DayGroup key={d} label={d} matches={byDate[d].matches} picks={picks} savePick={savePick} savePickMulti={savePickMulti} justSaved={justSaved} onGroupClick={stageFilter==='Grupos'?scrollToStandings:null} isPast={isPast} defaultOpen={!isPast}/>;
        })
      }
    </div>
  );
}

const MatchCard=React.memo(function MatchCard({match,pick,savePick,savePickMulti,saved,onGroupClick}){
  const locked=isLocked(match.match_time);
  const soon=isClosingSoon(match.match_time);
  const isKnockout=match.stage!=='Grupos';
  const hasPick=isKnockout
    ?(pick?.home_goals!=null&&pick?.away_goals!=null&&(pick?.home_goals!==pick?.away_goals||pick?.result))
    :(pick?.result&&pick?.goals!=null);
  const finished=match.home_score!=null&&match.away_score!=null;

  // Estado local para los inputs de marcador (eliminatorias) — se confirma con savePick al perder foco/cambiar
  const[hg,setHg]=useState(pick?.home_goals??'');
  const[ag,setAg]=useState(pick?.away_goals??'');
  useEffect(()=>{setHg(pick?.home_goals??'');setAg(pick?.away_goals??'');},[pick?.home_goals,pick?.away_goals,match.id]);

  function commitScore(newHg,newAg){
    const h=newHg===''?null:parseInt(newHg,10);
    const a=newAg===''?null:parseInt(newAg,10);
    if(h==null||a==null)return; // campos incompletos: bloquea sin alertar (blur silencioso normal)
    if(!Number.isFinite(h)||!Number.isFinite(a)||h<0||a<0||h>15||a>15){
      alert('Ingresa un marcador válido (0 a 15 goles por equipo).');
      return;
    }
    if(h===a){
      // Empate: guarda el marcador, limpia el ganador para forzar elección
      savePickMulti(match.id,{home_goals:h,away_goals:a,result:null});
    }else{
      // No empate: ganador automático
      const auto=h>a?'home':'away';
      savePickMulti(match.id,{home_goals:h,away_goals:a,result:auto});
    }
  }

  const isDraw=hg!==''&&ag!==''&&parseInt(hg,10)===parseInt(ag,10);

  if(isKnockout)return(
    <div className={`match-card ${locked?'locked-card':''} ${hasPick?'picked':''}`}>
      <div className="match-header">
        <div className="match-meta">{match.stage}</div>
        <div className="match-time-str">{formatMatchTime(match.match_time)}</div>
        <span className={`lock-badge ${locked?'locked':soon?'soon':'open'}`}>{locked?'🔒 Cerrado':soon?'🔥 Cierra pronto':'✅ Abierto'}</span>
      </div>
      {soon&&!locked&&<Countdown matchTime={match.match_time}/>}
      <div className="match-body">
        {saved&&<div className="pick-saved-toast">✓ Pick guardado</div>}
        {locked&&!hasPick&&<div className="no-pick">⚠️ Sin pick — este partido cuenta 0 puntos</div>}
        <div className="teams">
          <div className="team"><span className="team-flag">{FLAGS[match.home_team]||'🏳️'}</span><div className="team-name">{match.home_team}</div></div>
          <div className="vs">VS</div>
          <div className="team"><span className="team-flag">{FLAGS[match.away_team]||'🏳️'}</span><div className="team-name">{match.away_team}</div></div>
        </div>
        {finished&&(
          <div className="result-score">
            {match.home_score} — {match.away_score} {match.winner&&<span style={{fontSize:'0.78rem',color:'var(--accent2)'}}> · avanza {match.winner==='home'?match.home_team:match.away_team}</span>}
            {pick&&(()=>{const pts=calcPoints(pick,match);return<span style={{marginLeft:12,fontSize:'0.85rem',color:pts>=3?'var(--green)':'var(--muted)'}}>+{pts} pts</span>;})()}
          </div>
        )}
        <div className="pick-label" style={{marginTop:10}}>Marcador a 120 min (incluye prórroga)</div>
        <div className="knockout-score-row">
          <div className="ko-team-mini"><span className="team-flag">{FLAGS[match.home_team]||'🏳️'}</span><span>{match.home_team.split(' ')[0]}</span></div>
          <input className="score-input" type="number" min="0" max="20" disabled={locked} value={hg} onChange={e=>{setHg(e.target.value);}} onBlur={()=>commitScore(hg,ag)}/>
          <span className="score-dash">—</span>
          <input className="score-input" type="number" min="0" max="20" disabled={locked} value={ag} onChange={e=>{setAg(e.target.value);}} onBlur={()=>commitScore(hg,ag)}/>
          <div className="ko-team-mini"><span>{match.away_team.split(' ')[0]}</span><span className="team-flag">{FLAGS[match.away_team]||'🏳️'}</span></div>
        </div>
        {isDraw&&(
          <div className="pick-group" style={{marginTop:10}}>
            <div className="pick-label">⚠️ Es empate — ¿quién avanza por penales?</div>
            <div className="pick-options">
              <button className={`pick-btn ${pick?.result==='home'?'selected':''}`} disabled={locked} onClick={()=>savePick(match.id,'result','home')}>{FLAGS[match.home_team]||''} {match.home_team}</button>
              <button className={`pick-btn ${pick?.result==='away'?'selected':''}`} disabled={locked} onClick={()=>savePick(match.id,'result','away')}>{FLAGS[match.away_team]||''} {match.away_team}</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );

  return(
    <div className={`match-card ${locked?'locked-card':''} ${hasPick?'picked':''}`}>
      <div className="match-header">
        <div className="match-meta">{match.group_name
          ?(onGroupClick
            ?<button className="meta-link" onClick={()=>onGroupClick(match.group_name)}>Grupo {match.group_name} ↓</button>
            :`Grupo ${match.group_name}`)
          :match.stage}</div>
        <div className="match-time-str">{formatMatchTime(match.match_time)}</div>
        <span className={`lock-badge ${locked?'locked':soon?'soon':'open'}`}>{locked?'🔒 Cerrado':soon?'🔥 Cierra pronto':'✅ Abierto'}</span>
      </div>
      {soon&&!locked&&<Countdown matchTime={match.match_time}/>}
      <div className="match-body">
        {saved&&<div className="pick-saved-toast">✓ Pick guardado</div>}
        {locked&&!hasPick&&<div className="no-pick">⚠️ Sin pick — este partido cuenta 0 puntos</div>}
        <div className="teams">
          <div className="team"><span className="team-flag">{FLAGS[match.home_team]||'🏳️'}</span><div className="team-name">{match.home_team}</div></div>
          <div className="vs">VS</div>
          <div className="team"><span className="team-flag">{FLAGS[match.away_team]||'🏳️'}</span><div className="team-name">{match.away_team}</div></div>
        </div>
        {finished&&(
          <div className="result-score">
            {match.home_score} — {match.away_score}
            {pick?.result&&pick?.goals!=null&&(()=>{const pts=calcPoints(pick,match);return<span style={{marginLeft:12,fontSize:'0.85rem',color:pts>=3?'var(--green)':'var(--muted)'}}>+{pts} pts</span>;})()}
          </div>
        )}
        <div className="pick-row">
          <div className="pick-group">
            <div className="pick-label">Resultado</div>
            <div className="pick-options">
              {[{val:'home',label:match.home_team==='TBD'?'Local':match.home_team.split(' ')[0]},{val:'draw',label:'Empate'},{val:'away',label:match.away_team==='TBD'?'Visitante':match.away_team.split(' ')[0]}].map(opt=>(
                <button key={opt.val} className={`pick-btn ${pick?.result===opt.val?'selected':''}`} disabled={locked} onClick={()=>savePick(match.id,'result',opt.val)}>{opt.label}</button>
              ))}
            </div>
          </div>
          <div className="pick-group" style={{maxWidth:170}}>
            <div className="pick-label">Goles totales</div>
            <div className="pick-options">
              {[0,1,2,3,4].map(g=>(
                <button key={g} className={`pick-btn ${pick?.goals===g?'selected':''}`} disabled={locked} onClick={()=>savePick(match.id,'goals',g)}>{g===4?'4+':g}</button>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
});

function MoveBadge({move}){
  if(move==null)return null;
  if(move>0)return<span className="mv-badge mv-up">▲ {move}</span>;
  if(move<0)return<span className="mv-badge mv-down">▼ {Math.abs(move)}</span>;
  return<span className="mv-badge mv-same">—</span>;
}

function RankingsTab({rankings,userId,loading,onRefresh,groupName,predDeadline}){
  const stillOpen=predDeadline?Date.now()<new Date(predDeadline).getTime():false;
  const[showIntro,setShowIntro]=useState(stillOpen); // antes del cierre: aparece SIEMPRE al entrar a Ranking
  if(loading)return<div className="loading"><div className="spinner"/><span>Cargando ranking...</span></div>;
  const hasMovement=rankings.some(e=>e.move!=null);
  const snapLabel=rankings.find(e=>e.snapMatchLabel)?.snapMatchLabel;
  return(
    <div>
      {showIntro&&<PredictionsIntroModal onClose={()=>setShowIntro(false)} deadline={predDeadline}/>}
      <div className="tab-section"><div style={{flex:1}}><div className="section-title" style={{marginBottom:2}}>RANKING</div>{groupName&&<div style={{fontSize:'0.75rem',color:'var(--accent2)',fontWeight:600,letterSpacing:0.5,marginBottom:'0.5rem',textTransform:'uppercase'}}>{groupName}</div>}</div><button className="refresh-btn" onClick={onRefresh}>↻ Actualizar</button></div>
      {hasMovement&&snapLabel&&<div style={{fontSize:'0.72rem',color:'var(--muted)',textAlign:'center',marginBottom:'0.75rem',padding:'6px 12px',background:'rgba(255,255,255,0.03)',borderRadius:8}}>Movimiento tras: <strong style={{color:'var(--text)'}}>{snapLabel}</strong></div>}
      {rankings.length===0&&<div className="empty-state">¡Haz tus picks para aparecer en el ranking!</div>}
      {rankings.map((entry,i)=>{
        const pos=i+1,isMe=entry.profile.id===userId,color=getAvatarColor(entry.profile.username);
        return(
          <div key={entry.profile.id} className={`rank-card ${isMe?'me':''}`}>
            <div className="rank-pos">{pos===1?'🥇':pos===2?'🥈':pos===3?'🥉':pos}</div>
            <div className="rank-avatar" style={{background:color+'22',color}}>{getInitials(entry.profile.username)}</div>
            <div className="rank-info">
              <div className="rank-name">{entry.profile.username}{isMe&&<span style={{fontSize:'0.7rem',color:'var(--accent)',marginLeft:6}}>← tú</span>}</div>
              <div className="rank-sub">{entry.correct} correctos · {entry.total} jugados</div>
            </div>
            <div style={{textAlign:'right',display:'flex',flexDirection:'column',alignItems:'flex-end',gap:2}}>
              <MoveBadge move={entry.move}/>
              <div className="rank-points">{entry.pts}</div>
              <div className="pts-label">puntos</div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function AdminTab({matches,adminScores,setAdminScores,saveAdminScore,adminSaving,predResults,savePredResult}){
  const[filter,setFilter]=useState('Grupos');
  const filtered=matches.filter(m=>m.stage===filter);
  const todayStr=new Date().toLocaleDateString('en-CA',{timeZone:'America/Mexico_City'});
  const byDate=filtered.reduce((acc,m)=>{
    const dObj=new Date(m.match_time);
    const d=dObj.toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long'});
    const key=d.charAt(0).toUpperCase()+d.slice(1);
    if(!acc[key])acc[key]={matches:[],iso:dObj.toLocaleDateString('en-CA',{timeZone:'America/Mexico_City'})};
    acc[key].matches.push(m);return acc;
  },{});
  return(
    <div>
      <div className="section-title">ADMIN — RESULTADO DE PREDICCIONES</div>
      <p style={{color:'var(--muted)',fontSize:'0.82rem',marginTop:'-0.75rem',marginBottom:'1.25rem'}}>Fija el resultado oficial de cada predicción. Al guardar, los puntos se recalculan automáticamente para todos (acierto exacto = puntos completos).</p>
      <div className="admin-grid" style={{marginBottom:'2rem'}}>
        {PRED_DEFS.map(d=>(
          <div key={d.key} className="admin-card">
            <div className="admin-card-title">{d.label} · {d.pts} pts</div>
            {d.type==='team'
              ? <select className="pred-select" value={(predResults&&predResults[d.key])||''} onChange={e=>savePredResult(d.key,e.target.value)}>
                  <option value="">— Sin definir —</option>
                  {ALL_TEAMS.map(t=><option key={t} value={t}>{(FLAGS[t]||'')+' '+t}</option>)}
                </select>
              : <PlayerPicker value={(predResults&&predResults[d.key])||''} locked={false} onChange={v=>savePredResult(d.key,v)}/>}
            {predResults&&predResults[d.key]&&<div className="pred-saved">✓ {predResults[d.key]}</div>}
          </div>
        ))}
      </div>
      <div className="section-title">ADMIN — RESULTADOS DE PARTIDOS</div>
      <div className="stage-filter" style={{marginBottom:'1.25rem'}}>{STAGES.map(s=><button key={s} className={`stage-btn ${filter===s?'active':''}`} onClick={()=>setFilter(s)}>{s}</button>)}</div>
      {Object.keys(byDate).map(d=>{
        const isPast=byDate[d].iso<todayStr;
        const dayMatches=byDate[d].matches;
        const done=dayMatches.filter(m=>m.home_score!=null).length;
        return(
          <AdminDayGroup key={d} label={d} matches={dayMatches} isPast={isPast} defaultOpen={!isPast}
            done={done} adminScores={adminScores} setAdminScores={setAdminScores}
            saveAdminScore={saveAdminScore} adminSaving={adminSaving}/>
        );
      })}
    </div>
  );
}

function AdminDayGroup({label,matches,isPast,defaultOpen,done,adminScores,setAdminScores,saveAdminScore,adminSaving}){
  const[open,setOpen]=useState(defaultOpen);
  return(
    <div className={`day-group ${isPast?'past':''}`} style={{marginBottom:'0.75rem'}}>
      <button className="day-head" onClick={()=>setOpen(o=>!o)}>
        <span>{isPast?'✓ ':'📅 '}{label}</span>
        <span className="day-head-right">
          <span className="day-count">{done}/{matches.length}</span>
          <span className="day-caret">{open?'▲':'▼'}</span>
        </span>
      </button>
      {open&&<div className="admin-grid" style={{marginTop:'0.5rem'}}>
        {matches.map(match=>(
          <div key={match.id} className="admin-card">
            <div className="admin-card-title">{match.group_name?`Grupo ${match.group_name}`:match.stage} · {new Date(match.match_time).toLocaleDateString('es-MX',{day:'numeric',month:'short',timeZone:'America/Mexico_City'})}</div>
            <div className="admin-teams">
              <span>{FLAGS[match.home_team]||'🏳️'}</span>
              <span className="admin-team-name">{match.home_team}</span>
              <span className="admin-vs">vs</span>
              <span className="admin-team-name">{match.away_team}</span>
              <span>{FLAGS[match.away_team]||'🏳️'}</span>
            </div>
            {match.home_score!=null&&<div style={{fontSize:'0.8rem',color:'var(--green)',marginBottom:8}}>✅ {match.home_score} — {match.away_score}{match.winner&&<span> · avanza {match.winner==='home'?match.home_team:match.away_team}</span>}</div>}
            <div className="score-inputs">
              <input className="score-input" type="number" min="0" max="20" placeholder={match.home_score??'0'} value={adminScores[match.id]?.home??''} onChange={e=>setAdminScores(prev=>({...prev,[match.id]:{...prev[match.id],home:e.target.value}}))}/>
              <span className="score-dash">—</span>
              <input className="score-input" type="number" min="0" max="20" placeholder={match.away_score??'0'} value={adminScores[match.id]?.away??''} onChange={e=>setAdminScores(prev=>({...prev,[match.id]:{...prev[match.id],away:e.target.value}}))}/>
              <button className="btn-sm" onClick={()=>saveAdminScore(match.id)} disabled={adminSaving===match.id}>{adminSaving===match.id?'...':'Guardar'}</button>
            </div>
            {match.stage!=='Grupos'&&adminScores[match.id]?.home!==undefined&&adminScores[match.id]?.away!==undefined&&adminScores[match.id]?.home===adminScores[match.id]?.away&&adminScores[match.id]?.home!==''&&(
              <div style={{marginTop:8}}>
                <div style={{fontSize:'0.72rem',color:'var(--muted)',marginBottom:4}}>⚠️ Empate — ¿quién avanza por penales?</div>
                <div className="pick-options">
                  <button className={`pick-btn ${adminScores[match.id]?.winner==='home'?'selected':''}`} onClick={()=>setAdminScores(prev=>({...prev,[match.id]:{...prev[match.id],winner:'home'}}))}>{FLAGS[match.home_team]||''} {match.home_team}</button>
                  <button className={`pick-btn ${adminScores[match.id]?.winner==='away'?'selected':''}`} onClick={()=>setAdminScores(prev=>({...prev,[match.id]:{...prev[match.id],winner:'away'}}))}>{FLAGS[match.away_team]||''} {match.away_team}</button>
                </div>
              </div>
            )}
          </div>
        ))}
      </div>}
    </div>
  );
}

function PlayerPicker({value,onChange,locked,gkOnly=false}){
  const parse=(v)=>{const m=/^(.*)\s\(([^)]+)\)$/.exec(v||'');return m?{player:m[1],country:m[2]}:{player:'',country:''};};
  const init=parse(value);
  const[country,setCountry]=useState(init.country);
  useEffect(()=>{const c=parse(value).country;if(c&&c!==country)setCountry(c);},[value]);
  const player=init.player;
  const allPlayers=country?(PLAYERS[country]||[]):[];
  const gkList=gkOnly&&country?(GOALKEEPERS[country]||[]):[];
  const list=gkOnly?gkList:allPlayers;
  const noGks=gkOnly&&country&&gkList.length===0;
  return(
    <div className="player-picker">
      <select className="pred-select" disabled={locked} value={country} onChange={e=>{setCountry(e.target.value);if(gkOnly)onChange('');}}>
        <option value="">— Selección —</option>
        {ALL_TEAMS.map(t=><option key={t} value={t}>{(FLAGS[t]||'')+' '+t}</option>)}
      </select>
      {noGks
        ?<div style={{fontSize:'0.78rem',color:'var(--muted)',padding:'8px 4px'}}>⚠️ No hay porteros registrados para esta selección.</div>
        :<select className="pred-select" disabled={locked||!country} value={player} onChange={e=>{if(e.target.value)onChange(e.target.value+' ('+country+')');}}>
          <option value="">{country?(gkOnly?'— Portero —':'— Jugador —'):'Elige selección primero'}</option>
          {list.map(pl=><option key={pl} value={pl}>{pl}</option>)}
        </select>
      }
    </div>
  );
}

        {deadline&&<DeadlineCountdown deadline={deadline} label="Cierran en"/>}

          <div key={p.label} className="intro-pred-row">
            <div><div className="intro-pred-label">{p.label}</div><div className="intro-pred-desc">{p.desc}</div></div>
            <span className="pred-pts">{p.pts} pts</span>
          </div>

        {PLAYER_PREDS.map(p=>(
          <div key={p.label} className="intro-pred-row">
            <div><div className="intro-pred-label">{p.label}</div><div className="intro-pred-desc">{p.desc}</div></div>
            <span className="pred-pts">{p.pts} pts</span>
          </div>
        ))}

        <a className="intro-link" href="https://www.bbc.com/sport/football/world-cup/schedule#KnockoutStage" target="_blank" rel="noopener">
          📅 Ver partidos de eliminatorias (hasta el momento) ↗
        </a>
        <a className="intro-link" href="https://www.google.com/search?q=estad%C3%ADsticas+de+mundial" target="_blank" rel="noopener">
          📊 Ver estadísticas actuales (goles, asistencias...) ↗

        <button className="btn btn-primary" style={{marginTop:'1.25rem'}} onClick={onClose}>Entendido, ¡vamos! →</button>
      </div>
    </div>

}

function PredictionsTab({prediction,savePrediction,locked,deadline}){
  const TEAM_PREDS=[
    {key:'champion',label:'🏆 Campeón del mundo',pts:20},
    {key:'finalist',label:'🥈 Finalista (subcampeón)',pts:12},
    {key:'third_place',label:'🥉 Tercer lugar',pts:8},
    {key:'surprise_team',label:'🎲 Caballo negro del torneo',pts:10},
  ];
  const PLAYER_PREDS=[
    {key:'top_scorer',label:'👟 Bota de oro (más goles)',pts:15},
    {key:'clean_sheets',label:'🧤 Más arcos en cero',pts:12},
    {key:'assists',label:'🎯 Más asistencias',pts:12},
  ];
  const[showIntro,setShowIntro]=useState(()=>{try{return!localStorage.getItem('wc26_pred_intro_seen_v2');}catch(_){return false;}});
  function closeIntro(){try{localStorage.setItem('wc26_pred_intro_seen_v2','1');}catch(_){}setShowIntro(false);}
  const lockStr='28 de junio, antes de la 1:00 PM (hora CDMX)';
  return(
    <div style={{maxWidth:680,margin:'0 auto'}}>
      {showIntro&&<PredictionsIntroModal onClose={closeIntro} deadline={deadline}/>}
      <div className="tab-section">
        <div className="section-title">PREDICCIONES</div>
        <button className="info-btn" onClick={()=>setShowIntro(true)} title="Ver guía de predicciones">ℹ️</button>
      </div>
      <div className="pred-banner">
        <div>✏️ {locked?<span>Las predicciones están <strong>cerradas</strong> (ya comenzó la fase de 16avos).</span>:<span>Puedes editarlas hasta el <strong>{lockStr}</strong>, justo antes del primer partido de 16avos.</span>}</div>
        <div style={{marginTop:6,opacity:0.85}}>🔒 Son secretas hasta que termine la fase de grupos; después se revelan a todos.</div>
      </div>
      {!locked&&<DeadlineCountdown deadline={deadline} label="Predicciones cierran en"/>}
      <div className="links-row">
        <a className="links-row-item" href="https://www.bbc.com/sport/football/world-cup/schedule#KnockoutStage" target="_blank" rel="noopener">📅 Partidos de eliminatorias ↗</a>
        <a className="links-row-item" href="https://www.google.com/search?q=estad%C3%ADsticas+de+mundial" target="_blank" rel="noopener">📊 Estadísticas actuales ↗</a>
      </div>
      <div className="pred-group-title">⚽ Predicciones de equipo</div>
      {TEAM_PREDS.map(p=>(
        <div key={p.key} className="pred-card">
          <div className="pred-head"><span className="pred-label">{p.label}</span><span className="pred-pts">{p.pts} pts</span></div>
          {locked&&!(prediction&&prediction[p.key])&&<div className="no-pick" style={{marginBottom:8}}>⚠️ Sin predicción — 0 puntos</div>}
          <select className="pred-select" disabled={locked} value={(prediction&&prediction[p.key])||''} onChange={e=>savePrediction(p.key,e.target.value)}>
            <option value="">— Elige selección —</option>
            {ALL_TEAMS.map(t=><option key={t} value={t}>{(FLAGS[t]||'')+' '+t}</option>)}
          </select>
        </div>
      ))}
      <div className="pred-group-title">🌟 Predicciones de jugador</div>
      {PLAYER_PREDS.map(p=>(
        <div key={p.key} className="pred-card">
          <div className="pred-head"><span className="pred-label">{p.label}</span><span className="pred-pts">{p.pts} pts</span></div>
          {locked&&!(prediction&&prediction[p.key])&&<div className="no-pick" style={{marginBottom:8}}>⚠️ Sin predicción — 0 puntos</div>}
          <PlayerPicker value={(prediction&&prediction[p.key])||''} locked={locked} gkOnly={p.key==='clean_sheets'} onChange={v=>savePrediction(p.key,v)}/>
        </div>
      ))}
    </div>
  );
}

class ErrorBoundary extends React.Component{
  constructor(props){super(props);this.state={crashed:false,msg:''};}
  static getDerivedStateFromError(e){return{crashed:true,msg:e.message||String(e)};}
  componentDidCatch(e,info){console.error('App crash:',e,info);}
  render(){
    if(this.state.crashed)return(
      <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'#0a0e14',color:'#e8edf4',padding:'2rem',textAlign:'center'}}>
        <div style={{fontSize:'2.5rem',marginBottom:'1rem'}}>⚽</div>
        <div style={{fontFamily:'Bebas Neue,sans-serif',fontSize:'1.8rem',letterSpacing:2,marginBottom:'0.75rem'}}>TRIVIA MUNDIALISTA</div>
        <div style={{color:'#8b97a8',marginBottom:'1.5rem',fontSize:'0.9rem'}}>Ocurrió un error inesperado. Por favor recarga la página.</div>
        <button onClick={()=>window.location.reload()} style={{background:'#e8ff47',color:'#0a0e14',border:'none',borderRadius:10,padding:'12px 28px',fontFamily:'DM Sans,sans-serif',fontWeight:700,fontSize:'1rem',cursor:'pointer'}}>🔄 Recargar app</button>
        <details style={{marginTop:'1.5rem',color:'#8b97a8',fontSize:'0.7rem',maxWidth:400}}>
          <summary style={{cursor:'pointer'}}>Detalle del error</summary>
          <pre style={{marginTop:8,textAlign:'left',whiteSpace:'pre-wrap',wordBreak:'break-all'}}>{this.state.msg}</pre>
        </details>
      </div>
    );
    return this.props.children;
  }
}
ReactDOM.render(<ErrorBoundary><App/></ErrorBoundary>, document.getElementById('root'));
</script>
