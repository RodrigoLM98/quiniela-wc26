.score-input{width:50px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:1.1rem;font-weight:600;padding:7px;text-align:center;outline:none;}
.score-input:focus{border-color:var(--accent);}
.score-dash{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:var(--muted);}
.btn-sm{padding:7px 14px;border-radius:7px;border:none;font-family:'DM Sans',sans-serif;font-size:0.8rem;font-weight:600;cursor:pointer;transition:all 0.2s;background:var(--accent);color:#0a0e1a;}

.refresh-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:0.75rem;padding:6px 12px;border-radius:8px;cursor:pointer;transition:all 0.2s;}

.group-label{font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--accent2);margin-bottom:8px;margin-top:16px;display:flex;align-items:center;justify-content:space-between;}

const FLAGS = {'México':'🇲🇽','Estados Unidos':'🇺🇸','Canadá':'🇨🇦','Argentina':'🇦🇷','Brasil':'🇧🇷','Francia':'🇫🇷','Alemania':'🇩🇪','España':'🇪🇸','Inglaterra':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','Portugal':'🇵🇹','Uruguay':'🇺🇾','Colombia':'🇨🇴','Ecuador':'🇪🇨','Marruecos':'🇲🇦','Senegal':'🇸🇳','Japón':'🇯🇵','Corea del Sur':'🇰🇷','Arabia Saudita':'🇸🇦','Australia':'🇦🇺','Países Bajos':'🇳🇱','Bélgica':'🇧🇪','Croacia':'🇭🇷','Suiza':'🇨🇭','Dinamarca':'🇩🇰','Turquía':'🇹🇷','Escocia':'🏴󠁧󠁢󠁳󠁣󠁴󠁿','Panamá':'🇵🇦','Venezuela':'🇻🇪','Paraguay':'🇵🇾','Qatar':'🇶🇦','Argelia':'🇩🇿','Egipto':'🇪🇬','Sudáfrica':'🇿🇦','Costa de Marfil':'🇨🇮','Haití':'🇭🇹','Noruega':'🇳🇴','Iraq':'🇮🇶','Austria':'🇦🇹','Jordania':'🇯🇴','Uzbekistán':'🇺🇿','DR Congo':'🇨🇩','Chequia':'🇨🇿','Bosnia':'🇧🇦','Curazao':'🇨🇼','Túnez':'🇹🇳','Suecia':'🇸🇪','Nueva Zelanda':'🇳🇿','Cabo Verde':'🇨🇻','Ghana':'🇬🇭','Serbia':'🇷🇸','Irán':'🇮🇷','Nigeria':'🇳🇬','Chile':'🇨🇱','Polonia':'🇵🇱','TBD':'🏳️'};
const STAGES = ['Grupos','32avos','Octavos','Cuartos','Semis','Final'];
const ALL_GROUPS = ['A','B','C','D','E','F','G','H','I','J','K','L'];

function isLocked(mt){return new Date()>=new Date(new Date(mt).getTime()-60*60*1000);}
function getTimeUntilLock(mt){return new Date(new Date(mt).getTime()-60*60*1000)-new Date();}
function isClosingSoon(mt){const d=getTimeUntilLock(mt);return d>0&&d<6*60*60*1000;}
function formatMatchTime(mt){const d=new Date(mt);return d.toLocaleDateString('es-MX',{weekday:'short',day:'numeric',month:'short'})+' · '+d.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});}
function getAvatarColor(name){const c=['#e8ff47','#00d4ff','#ff6b9d','#7c3aed','#f59e0b','#10b981'];let h=0;for(let x of name)h=(h*31+x.charCodeAt(0))%c.length;return c[h];}
function getInitials(name){return name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function calcPoints(pick,match){
  if(match.home_score==null||match.away_score==null)return 0;
  let pts=0;
  const actual=match.home_score>match.away_score?'home':match.away_score>match.home_score?'away':'draw';
  if(pick.result===actual)pts+=3;
  const total=match.home_score+match.away_score;
  const ag=total>=4?4:total;
  if(pick.goals===ag)pts+=1;
  return pts;
}
function calcGroupStandings(group,matches){
  const gm=matches.filter(m=>m.group_name===group&&m.home_team!=='TBD');
  const teams={};
  gm.forEach(m=>{
    if(!teams[m.home_team])teams[m.home_team]={name:m.home_team,pj:0,g:0,e:0,p:0,gf:0,gc:0,pts:0};
    if(!teams[m.away_team])teams[m.away_team]={name:m.away_team,pj:0,g:0,e:0,p:0,gf:0,gc:0,pts:0};
    if(m.home_score!=null&&m.away_score!=null){
      const hs=m.home_score,as=m.away_score;
      teams[m.home_team].pj++;teams[m.away_team].pj++;
      teams[m.home_team].gf+=hs;teams[m.home_team].gc+=as;
      teams[m.away_team].gf+=as;teams[m.away_team].gc+=hs;
      if(hs>as){teams[m.home_team].g++;teams[m.home_team].pts+=3;teams[m.away_team].p++;}
      else if(as>hs){teams[m.away_team].g++;teams[m.away_team].pts+=3;teams[m.home_team].p++;}
      else{teams[m.home_team].e++;teams[m.home_team].pts++;teams[m.away_team].e++;teams[m.away_team].pts++;}
    }
  });
  return Object.values(teams).sort((a,b)=>{
    if(b.pts!==a.pts)return b.pts-a.pts;
    const da=a.gf-a.gc,db=b.gf-b.gc;
    if(db!==da)return db-da;
    return b.gf-a.gf;
  });
}

function Countdown({matchTime}){
  const[diff,setDiff]=useState(getTimeUntilLock(matchTime));
  useEffect(()=>{const t=setInterval(()=>setDiff(getTimeUntilLock(matchTime)),1000);return()=>clearInterval(t);},[matchTime]);
  if(diff<=0)return null;
  const s=Math.floor(diff/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  const pad=n=>String(n).padStart(2,'0');
  return(
    <div className="countdown-bar">
      <span className="countdown-label">⏳ Cierra en</span>
      <div className="countdown-digits">
        {h>0&&<><div className="cd-block"><div className="cd-num">{pad(h)}</div><div className="cd-unit">hrs</div></div><span className="cd-sep">:</span></>}
        <div className="cd-block"><div className="cd-num">{pad(m)}</div><div className="cd-unit">min</div></div>
        <span className="cd-sep">:</span>
        <div className="cd-block"><div className="cd-num">{pad(sec)}</div><div className="cd-unit">seg</div></div>
      </div>
    </div>
  );
}

function OnboardingScreen({username,onDone}){
  const[step,setStep]=useState(0);
  const steps=[
    {icon:'⚽',title:'Elige el resultado',desc:'Para cada partido selecciona quién gana o si hay empate. Acertar te da 3 puntos.'},
    {icon:'🎯',title:'Adivina los goles',desc:'También elige cuántos goles en total: 1, 2, 3 o 4+. Acertar te suma 1 punto extra.'},
    {icon:'⏰',title:'Cierra 1 hora antes',desc:'Puedes cambiar tu predicción hasta 1 hora antes del partido. Después se bloquea.'},
    {icon:'🏆',title:'Sigue el ranking',desc:'Ve en qué lugar estás versus todos los participantes en tiempo real.'},
  ];
  const isLast=step===steps.length-1;
  return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)',padding:'1.5rem'}}>
      <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:16,padding:'2.5rem',width:'100%',maxWidth:420,textAlign:'center'}}>
        <div style={{fontFamily:'Bebas Neue,sans-serif',fontSize:'1rem',letterSpacing:3,color:'var(--accent2)',marginBottom:8}}>BIENVENIDO</div>
        <div style={{fontFamily:'Bebas Neue,sans-serif',fontSize:'2.2rem',letterSpacing:2,marginBottom:'0.25rem'}}>HOLA, {username.toUpperCase()} 👋</div>
        <p style={{color:'var(--muted)',fontSize:'0.9rem',marginBottom:'2rem'}}>Así funciona la quiniela:</p>
        <div style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:12,padding:'1.5rem 1.25rem',marginBottom:'1.5rem',minHeight:140}}>
          <div style={{fontSize:'2.5rem',marginBottom:12}}>{steps[step].icon}</div>
          <div style={{fontWeight:600,fontSize:'1rem',marginBottom:8}}>{steps[step].title}</div>
          <div style={{color:'var(--muted)',fontSize:'0.87rem',lineHeight:1.6}}>{steps[step].desc}</div>
        </div>
        <div style={{display:'flex',gap:6,justifyContent:'center',marginBottom:'1.5rem'}}>
          {steps.map((_,i)=>(
            <div key={i} style={{width:i===step?24:8,height:8,borderRadius:4,background:i===step?'var(--accent)':'var(--surface2)',border:'1px solid var(--border)',transition:'all 0.2s'}}/>
          ))}
        </div>
        <button onClick={()=>isLast?onDone():setStep(s=>s+1)}
          style={{width:'100%',padding:12,borderRadius:8,border:'none',fontFamily:'DM Sans,sans-serif',fontSize:'0.95rem',fontWeight:600,cursor:'pointer',background:'var(--accent)',color:'#0a0e1a',marginBottom:12}}>
          {isLast?'¡A jugar! 🚀':'Siguiente →'}
        </button>
        {step>0&&<div style={{marginBottom:8}}><span onClick={()=>setStep(s=>s-1)} style={{fontSize:'0.8rem',color:'var(--muted)',cursor:'pointer'}}>← Anterior</span></div>}
        <div><span onClick={onDone} style={{fontSize:'0.8rem',color:'var(--muted)',cursor:'pointer',opacity:0.6}}>Saltar intro</span></div>
      </div>
    </div>
  );
}

function GroupStandings({matches,selectedGroup,onSelectGroup}){
  const standings=calcGroupStandings(selectedGroup,matches);
  return(
    <div className="sidebar-card">
      <div className="sidebar-header">
        <div>
          <div className="sidebar-title">Posiciones</div>
          <div className="sidebar-subtitle">Grupo {selectedGroup}</div>
        </div>
        <div className="live-dot" title="Tiempo real"/>
      </div>
      <div className="group-tabs">
        {ALL_GROUPS.map(g=>(
          <button key={g} className={`group-tab ${selectedGroup===g?'active':''}`} onClick={()=>onSelectGroup(g)}>{g}</button>
        ))}
      </div>
      <table className="standings-table">
        <thead>
          <tr>
            <th style={{width:16}}>#</th>
            <th style={{textAlign:'left',paddingLeft:12}}>Equipo</th>
            <th>PJ</th><th>G</th><th>E</th><th>P</th>
            <th>GF</th><th>GC</th><th>Dif</th><th>Pts</th>
          </tr>
        </thead>
        <tbody>
          {standings.map((team,i)=>{
            const diff=team.gf-team.gc;
            const rowClass=i<2?'qualify':i===2?'maybe':'';
            return(
              <tr key={team.name} className={rowClass}>
                <td><span className="pos-num">{i+1}</span></td>
                <td><div className="team-cell"><span className="flag">{FLAGS[team.name]||'🏳️'}</span><span className="tname">{team.name}</span></div></td>
                <td>{team.pj}</td><td>{team.g}</td><td>{team.e}</td><td>{team.p}</td>
                <td>{team.gf}</td><td>{team.gc}</td>
                <td><span className={diff>0?'diff-pos':diff<0?'diff-neg':'diff-zero'}>{diff>0?'+':''}{diff}</span></td>
                <td><span className="pts-val">{team.pts}</span></td>
              </tr>
            );
          })}
          {standings.length===0&&<tr><td colSpan={10} style={{textAlign:'center',padding:'16px',color:'var(--muted)',fontSize:'0.8rem'}}>Sin partidos jugados aún</td></tr>}
        </tbody>
      </table>
      <div className="standings-legend">
        <div className="legend-item"><div className="legend-dot" style={{background:'var(--accent2)'}}></div><span>Clasifican directo</span></div>
        <div className="legend-item"><div className="legend-dot" style={{background:'var(--accent)',opacity:0.6}}></div><span>Posible 3°</span></div>
      </div>
    </div>
  );
}

function App(){
  const[user,setUser]=useState(null);
  const[profile,setProfile]=useState(null);
  const[authMode,setAuthMode]=useState('login');
  const[tab,setTab]=useState('picks');
  const[matches,setMatches]=useState([]);
  const[picks,setPicks]=useState({});
  const[allPicks,setAllPicks]=useState([]);
  const[profiles,setProfiles]=useState([]);
  const[loading,setLoading]=useState(true);
  const[authLoading,setAuthLoading]=useState(false);
  const[authError,setAuthError]=useState('');
  const[stageFilter,setStageFilter]=useState('Grupos');
  const[justSaved,setJustSaved]=useState(null);
  const[adminScores,setAdminScores]=useState({});
  const[adminSaving,setAdminSaving]=useState(null);
  const[rankingsLoading,setRankingsLoading]=useState(false);
  const[selectedGroup,setSelectedGroup]=useState('A');
  const[showOnboarding,setShowOnboarding]=useState(false);
  const[recoveryMode,setRecoveryMode]=useState(()=>{
    const h=window.location.hash;
    return h.includes('type=recovery');
  });

  useEffect(()=>{
    // If we arrived via a recovery link, do NOT auto-login. Show reset form.
    const isRecovery=window.location.hash.includes('type=recovery');
    if(isRecovery){
      setRecoveryMode(true);
      setLoading(false);
      return;
    }
    sb.auth.getSession().then(({data:{session}})=>{
      if(session){setUser(session.user);loadProfile(session.user.id,false);}
      else setLoading(false);
    });
    sb.auth.onAuthStateChange((event,session)=>{
      if(event==='PASSWORD_RECOVERY'){
        setRecoveryMode(true);
        setLoading(false);
        return;
      }
      if(session){setUser(session.user);loadProfile(session.user.id,false);}
      else{setUser(null);setProfile(null);setLoading(false);}
    });
  },[]);

  useEffect(()=>{
    if(!user)return;
    const sub=sb.channel('matches-rt')
      .on('postgres_changes',{event:'UPDATE',schema:'public',table:'matches'},(payload)=>{
        setMatches(prev=>prev.map(m=>m.id===payload.new.id?payload.new:m));
      }).subscribe();
    return()=>sb.removeChannel(sub);
  },[user]);

  async function loadProfile(uid,isNew){
    const{data}=await sb.from('profiles').select('*').eq('id',uid).single();
    setProfile(data);
    await loadMatches();
    await loadMyPicks(uid);
    if(isNew)setShowOnboarding(true);
    setLoading(false);
  }
  async function loadMatches(){const{data}=await sb.from('matches').select('*').order('match_time');if(data&&data.length>0)setMatches(data);}
  async function loadMyPicks(uid){const{data}=await sb.from('picks').select('*').eq('user_id',uid);if(data){const map={};data.forEach(p=>{map[p.match_id]=p;});setPicks(map);}}
  async function loadRankings(){setRankingsLoading(true);const[{data:ap},{data:pr}]=await Promise.all([sb.from('picks').select('*'),sb.from('profiles').select('*')]);if(ap)setAllPicks(ap);if(pr)setProfiles(pr);setRankingsLoading(false);}

  const getRankings=useCallback(()=>{
    const mm={};matches.forEach(m=>mm[m.id]=m);
    const us={};profiles.forEach(p=>{us[p.id]={profile:p,pts:0,correct:0,total:0};});
    allPicks.forEach(pick=>{const match=mm[pick.match_id];if(!match||match.home_score==null||!us[pick.user_id])return;const pts=calcPoints(pick,match);us[pick.user_id].pts+=pts;if(pts>=3)us[pick.user_id].correct+=1;us[pick.user_id].total+=1;});
    return Object.values(us).sort((a,b)=>b.pts-a.pts);
  },[matches,allPicks,profiles]);

  const[registerSuccess,setRegisterSuccess]=useState('');
  async function handleAuth(e,email,password,username){
    e.preventDefault();setAuthLoading(true);setAuthError('');setRegisterSuccess('');
    if(authMode==='login'){
      const{error}=await sb.auth.signInWithPassword({email,password});
      if(error)setAuthError(error.message);
    }else{
      const{data,error}=await sb.auth.signUp({email,password});
      if(error){setAuthError(error.message);setAuthLoading(false);return;}
      if(data.user&&data.user.identities&&data.user.identities.length>0){
        await sb.from('profiles').insert({id:data.user.id,username});
        if(data.session){setShowOnboarding(true);}
        else{setRegisterSuccess('¡Cuenta creada! Revisa tu correo (incluyendo spam) para confirmar tu cuenta antes de entrar.');}
      }
    }
    setAuthLoading(false);
  }

  const savePick=useCallback(async function(matchId,field,value){
    if(!user)return;
    const existing=picks[matchId]||{};
    const optimistic={...existing,user_id:user.id,match_id:matchId,[field]:value,updated_at:new Date().toISOString()};
    setPicks(prev=>({...prev,[matchId]:optimistic}));
    setJustSaved(`${matchId}-${field}`);
    setTimeout(()=>setJustSaved(null),1500);
    const{data,error}=await sb.from('picks').upsert(optimistic,{onConflict:'user_id,match_id'}).select().single();
    if(error){setPicks(prev=>({...prev,[matchId]:existing}));}
    else if(data){setPicks(prev=>({...prev,[matchId]:data}));}
  },[user,picks]);

  async function saveAdminScore(matchId){
    const s=adminScores[matchId];if(!s||s.home==null||s.away==null)return;
    setAdminSaving(matchId);
    const hs=parseInt(s.home),as=parseInt(s.away);
    await sb.from('matches').update({home_score:hs,away_score:as,status:'finished'}).eq('id',matchId);
    setMatches(prev=>prev.map(m=>m.id===matchId?{...m,home_score:hs,away_score:as,status:'finished'}:m));
    setAdminSaving(null);
  }

  function scrollToStandings(group){
    onGroupChange(group);
    setTimeout(()=>{
      const el=document.getElementById('standings-sidebar');
      if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
    },50);
  }

  function onGroupChange(g){setSelectedGroup(g);}

  if(recoveryMode)return<ResetPasswordScreen onDone={()=>{setRecoveryMode(false);window.location.hash='';window.location.reload();}}/>;
  if(loading)return<div className="app"><div className="loading"><div className="spinner"/><span>Cargando quiniela...</span></div></div>;
  if(!user||!profile)return<AuthScreen onAuth={handleAuth} authMode={authMode} setAuthMode={setAuthMode} loading={authLoading} error={authError} registerSuccess={registerSuccess}/>;
  if(showOnboarding)return<OnboardingScreen username={profile.username} onDone={()=>setShowOnboarding(false)}/>;

  const isAdmin=user.email==='admin@quiniela2026.com'||profile.username==='admin';
  const myPoints=Object.values(picks).reduce((acc,pick)=>{const match=matches.find(m=>m.id===pick.match_id);if(!match||match.home_score==null)return acc;return acc+calcPoints(pick,match);},0);

  return(
    <div className="app">
      <header className="header">
        <div className="header-inner">
          <div className="logo">QUINIELA <span>WC26</span></div>
          <nav className="nav">
            <button className={`nav-btn ${tab==='picks'?'active':''}`} onClick={()=>setTab('picks')}>Partidos</button>
            <button className={`nav-btn ${tab==='rankings'?'active':''}`} onClick={()=>{setTab('rankings');loadRankings();}}>Ranking</button>
            {isAdmin&&<button className={`nav-btn ${tab==='admin'?'active':''}`} onClick={()=>setTab('admin')}>Admin</button>}
          </nav>
          <div className="user-bar">
            <div className="user-chip"><span className="points-pill">⚽ {myPoints} pts</span><strong>{profile.username}</strong></div>
            <button className="logout-btn" onClick={()=>sb.auth.signOut()}>Salir</button>
          </div>
        </div>
      </header>
      <main className="main">
        {tab==='picks'&&(
          <div className="picks-layout">
            <PicksTab matches={matches} picks={picks} stageFilter={stageFilter} setStageFilter={setStageFilter} savePick={savePick} justSaved={justSaved} onGroupChange={onGroupChange} scrollToStandings={scrollToStandings}/>
            {stageFilter==='Grupos'&&(
              <div className="sidebar" id="standings-sidebar">
                <GroupStandings matches={matches} selectedGroup={selectedGroup} onSelectGroup={onGroupChange}/>
              </div>
            )}
          </div>
        )}
        {tab==='rankings'&&<RankingsTab rankings={getRankings()} userId={user.id} loading={rankingsLoading} onRefresh={loadRankings}/>}
        {tab==='admin'&&isAdmin&&<AdminTab matches={matches} adminScores={adminScores} setAdminScores={setAdminScores} saveAdminScore={saveAdminScore} adminSaving={adminSaving}/>}
      </main>
    </div>
  );
}

function ResetPasswordScreen({onDone}){
  const[newPassword,setNewPassword]=useState('');
  const[confirmPassword,setConfirmPassword]=useState('');
  const[loading,setLoading]=useState(false);
  const[msg,setMsg]=useState('');
  async function handleReset(e){
    e.preventDefault();
    if(newPassword!==confirmPassword){setMsg('Las contraseñas no coinciden.');return;}
    setLoading(true);setMsg('');
    const{error}=await sb.auth.updateUser({password:newPassword});
    if(error)setMsg('Error: '+error.message);
    else{setMsg('✅ ¡Contraseña actualizada! Redirigiendo...');setTimeout(onDone,1800);}
    setLoading(false);
  }
  return(
    <div className="auth-wrap"><div className="auth-card">
      <div className="auth-title">NUEVA<br/><span style={{color:'var(--accent2)'}}>CONTRASEÑA</span></div>
      <p className="auth-sub">Elige una nueva contraseña para tu cuenta.</p>
      {msg&&<div className={msg.startsWith('✅')?'success-msg':'error-msg'}>{msg}</div>}
      {!msg.startsWith('✅')&&<form onSubmit={handleReset}>
        <div className="field"><label>Nueva contraseña</label><input type="password" value={newPassword} onChange={e=>setNewPassword(e.target.value)} placeholder="••••••••" required minLength={6} autoComplete="new-password"/></div>
        <div className="field"><label>Confirmar contraseña</label><input type="password" value={confirmPassword} onChange={e=>setConfirmPassword(e.target.value)} placeholder="••••••••" required minLength={6} autoComplete="new-password"/></div>
        <button className="btn btn-primary" type="submit" disabled={loading}>{loading?'Guardando...':'Guardar contraseña'}</button>
      </form>}
    </div></div>
  );
}

function AuthScreen({onAuth,authMode,setAuthMode,loading,error,registerSuccess}){
  const[email,setEmail]=useState('');
  const[password,setPassword]=useState('');
  const[username,setUsername]=useState('');
  const[forgotMode,setForgotMode]=useState(false);
  const[forgotLoading,setForgotLoading]=useState(false);
  const[forgotMsg,setForgotMsg]=useState('');
  async function handleForgot(e){
    e.preventDefault();setForgotLoading(true);setForgotMsg('');
    const{error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:'https://www.wc26pool.com'});
    if(error)setForgotMsg('Error: '+error.message);
    else setForgotMsg('✅ Revisa tu correo, te enviamos el link para restablecer tu contraseña.');
    setForgotLoading(false);
  }
  if(forgotMode){
    return(
      <div className="auth-wrap"><div className="auth-card">
        <div className="auth-title">RECUPERAR<br/><span style={{color:'var(--accent2)'}}>CONTRASEÑA</span></div>
        <p className="auth-sub">Te enviamos un link a tu correo para crear una nueva contraseña.</p>
        {forgotMsg&&<div className={forgotMsg.startsWith('✅')?'success-msg':'error-msg'}>{forgotMsg}</div>}
        {!forgotMsg&&<form onSubmit={handleForgot}>
          <div className="field"><label>Correo electrónico</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="tu@correo.com" autoComplete="email" required/></div>
          <button className="btn btn-primary" type="submit" disabled={forgotLoading}>{forgotLoading?'Enviando...':'Enviar link'}</button>
        </form>}
        <p className="auth-toggle"><a onClick={()=>{setForgotMode(false);setForgotMsg('');}}>← Volver al inicio de sesión</a></p>
      </div></div>
    );
  }
  return(
    <div className="auth-wrap"><div className="auth-card">
      <div className="auth-title">QUINIELA<br/>WC <span style={{color:'var(--accent2)'}}>2026</span></div>
      <p className="auth-sub">{authMode==='login'?'Inicia sesión para participar':'Crea tu cuenta y participa'}</p>
      {error&&<div className="error-msg">{error}</div>}
      {registerSuccess&&<div className="success-msg">{registerSuccess}</div>}
      <form onSubmit={e=>onAuth(e,email,password,username)}>
        {authMode==='register'&&(<div className="field"><label>Nombre en la quiniela</label><input value={username} onChange={e=>setUsername(e.target.value)} placeholder="ej. ElChavo" autoComplete="username" required/></div>)}
        <div className="field"><label>Correo electrónico</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="tu@correo.com" autoComplete="email" required/></div>
        <div className="field">
          <label style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span>Contraseña</span>
            {authMode==='login'&&<span onClick={()=>setForgotMode(true)} style={{fontSize:'0.72rem',color:'var(--accent)',cursor:'pointer',fontWeight:600,textTransform:'none',letterSpacing:0}}>¿Olvidaste tu contraseña?</span>}
          </label>
          <input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••••" autoComplete={authMode==="register"?"new-password":"current-password"} required minLength={6}/>
        </div>
        <button className="btn btn-primary" type="submit" disabled={loading}>{loading?'Cargando...':authMode==='login'?'Entrar':'Registrarme'}</button>
      </form>
      <p className="auth-toggle">{authMode==='login'?<><span>¿No tienes cuenta? </span><a onClick={()=>setAuthMode('register')}>Regístrate</a></>:<><span>¿Ya tienes cuenta? </span><a onClick={()=>setAuthMode('login')}>Inicia sesión</a></>}</p>
    </div></div>
  );
}

function PicksTab({matches,picks,savePick,justSaved,stageFilter,setStageFilter,onGroupChange,scrollToStandings}){
  const filtered=matches.filter(m=>m.stage===stageFilter);
  const pickedCount=filtered.filter(m=>picks[m.id]?.result&&picks[m.id]?.goals).length;
  const pct=filtered.length>0?Math.round((pickedCount/filtered.length)*100):0;
  const groupedMatches=stageFilter==='Grupos'?ALL_GROUPS.reduce((acc,g)=>{const ms=filtered.filter(m=>m.group_name===g);if(ms.length)acc[g]=ms;return acc;},{}):null;
  return(
    <div>
      <div className="tab-section"><div className="section-title">TUS PICKS</div></div>
      <div className="picks-progress">
        <div className="progress-labels"><span>{pickedCount} de {filtered.length} partidos elegidos</span><strong>{pct}%</strong></div>
        <div className="progress-track"><div className="progress-fill" style={{width:pct+'%'}}/></div>
      </div>
      <div className="stage-filter">{STAGES.map(s=><button key={s} className={`stage-btn ${stageFilter===s?'active':''}`} onClick={()=>setStageFilter(s)}>{s}</button>)}</div>
      {stageFilter==='Grupos'&&groupedMatches
        ?ALL_GROUPS.filter(g=>groupedMatches[g]).map(g=>(
          <div key={g}>
            <div className="group-label">
              <span>Grupo {g}</span>
              <button className="group-label-btn" onClick={()=>scrollToStandings(g)}>posiciones ↓</button>
            </div>
            {groupedMatches[g].map(match=><MatchCard key={match.id} match={match} pick={picks[match.id]} savePick={savePick} justSaved={justSaved}/>)}
          </div>
        ))
        :filtered.length===0
          ?<div className="empty-state">No hay partidos en esta fase aún</div>
          :filtered.map(match=><MatchCard key={match.id} match={match} pick={picks[match.id]} savePick={savePick} justSaved={justSaved}/>)
      }
    </div>
  );
}

function MatchCard({match,pick,savePick,justSaved}){
  const locked=isLocked(match.match_time);
  const soon=isClosingSoon(match.match_time);
  const hasPick=pick?.result&&pick?.goals;
  const finished=match.home_score!=null&&match.away_score!=null;
  return(
    <div className={`match-card ${locked?'locked-card':''} ${hasPick?'picked':''}`}>
      <div className="match-header">
        <div className="match-meta">{match.group_name?`Grupo ${match.group_name}`:match.stage}</div>
        <div className="match-time-str">{formatMatchTime(match.match_time)}</div>
        {locked?<span className="lock-badge locked">🔒 Cerrado</span>:soon?<span className="lock-badge soon">🔥 Cierra pronto</span>:<span className="lock-badge open">✅ Abierto</span>}
      </div>
      {soon&&!locked&&<Countdown matchTime={match.match_time}/>}
      <div className="match-body">
        {justSaved&&justSaved.startsWith(`${match.id}-`)&&<div className="pick-saved-toast">✓ Pick guardado</div>}
        <div className="teams">
          <div className="team"><span className="team-flag">{FLAGS[match.home_team]||'🏳️'}</span><div className="team-name">{match.home_team}</div></div>
          <div className="vs">VS</div>
          <div className="team"><span className="team-flag">{FLAGS[match.away_team]||'🏳️'}</span><div className="team-name">{match.away_team}</div></div>
        </div>
        {finished&&(
          <div className="result-score">
            {match.home_score} — {match.away_score}
            {pick?.result&&pick?.goals&&(()=>{const pts=calcPoints(pick,match);return<span style={{marginLeft:12,fontSize:'0.85rem',color:pts>=3?'var(--green)':'var(--muted)'}}>+{pts} pts</span>;})()}
          </div>
        )}
        <div className="pick-row">
          <div className="pick-group">
            <div className="pick-label">Resultado</div>
            <div className="pick-options">
              {[{val:'home',label:match.home_team==='TBD'?'Local':match.home_team.split(' ')[0]},{val:'draw',label:'Empate'},{val:'away',label:match.away_team==='TBD'?'Visitante':match.away_team.split(' ')[0]}].map(opt=>(
                <button key={opt.val} className={`pick-btn ${pick?.result===opt.val?'selected':''}`} disabled={locked} onClick={()=>savePick(match.id,'result',opt.val)}>{opt.label}</button>
              ))}
            </div>
          </div>
          <div className="pick-group" style={{maxWidth:170}}>
            <div className="pick-label">Goles totales</div>
            <div className="pick-options">
              {[0,1,2,3,4].map(g=>(
                <button key={g} className={`pick-btn ${pick?.goals===g?'selected':''}`} disabled={locked} onClick={()=>savePick(match.id,'goals',g)}>{g===4?'4+':g}</button>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function RankingsTab({rankings,userId,loading,onRefresh}){
  if(loading)return<div className="loading"><div className="spinner"/><span>Cargando ranking...</span></div>;
  return(
    <div>
      <div className="tab-section"><div className="section-title">RANKING</div><button className="refresh-btn" onClick={onRefresh}>↻ Actualizar</button></div>
      {rankings.length===0&&<div className="empty-state">¡Haz tus picks para aparecer en el ranking!</div>}
      {rankings.map((entry,i)=>{
        const pos=i+1,isMe=entry.profile.id===userId,color=getAvatarColor(entry.profile.username);
        return(
          <div key={entry.profile.id} className={`rank-card ${isMe?'me':''}`}>
            <div className="rank-pos">{pos===1?'🥇':pos===2?'🥈':pos===3?'🥉':pos}</div>
            <div className="rank-avatar" style={{background:color+'22',color}}>{getInitials(entry.profile.username)}</div>
            <div className="rank-info">
              <div className="rank-name">{entry.profile.username}{isMe&&<span style={{fontSize:'0.7rem',color:'var(--accent)',marginLeft:6}}>← tú</span>}</div>
              <div className="rank-sub">{entry.correct} correctos · {entry.total} jugados</div>
            </div>
            <div style={{textAlign:'right'}}>
              <div className="rank-points">{entry.pts}</div>
              <div className="pts-label">puntos</div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function AdminTab({matches,adminScores,setAdminScores,saveAdminScore,adminSaving}){
  const[filter,setFilter]=useState('Grupos');
  const filtered=matches.filter(m=>m.stage===filter);
  return(
    <div>
      <div className="section-title">ADMIN — RESULTADOS</div>
      <div className="stage-filter" style={{marginBottom:'1.25rem'}}>{STAGES.map(s=><button key={s} className={`stage-btn ${filter===s?'active':''}`} onClick={()=>setFilter(s)}>{s}</button>)}</div>
      <div className="admin-grid">
        {filtered.map(match=>(
          <div key={match.id} className="admin-card">
            <div className="admin-card-title">{match.group_name?`Grupo ${match.group_name}`:match.stage} · {new Date(match.match_time).toLocaleDateString('es-MX',{day:'numeric',month:'short'})}</div>
            <div className="admin-teams">
              <span>{FLAGS[match.home_team]||'🏳️'}</span>
              <span className="admin-team-name">{match.home_team}</span>
              <span className="admin-vs">vs</span>
              <span className="admin-team-name">{match.away_team}</span>
              <span>{FLAGS[match.away_team]||'🏳️'}</span>
            </div>
            {match.home_score!=null&&<div style={{fontSize:'0.8rem',color:'var(--green)',marginBottom:8}}>✅ {match.home_score} — {match.away_score}</div>}
            <div className="score-inputs">
              <input className="score-input" type="number" min="0" max="20" placeholder={match.home_score??'0'} value={adminScores[match.id]?.home??''} onChange={e=>setAdminScores(prev=>({...prev,[match.id]:{...prev[match.id],home:e.target.value}}))}/>
              <span className="score-dash">—</span>
              <input className="score-input" type="number" min="0" max="20" placeholder={match.away_score??'0'} value={adminScores[match.id]?.away??''} onChange={e=>setAdminScores(prev=>({...prev,[match.id]:{...prev[match.id],away:e.target.value}}))}/>
              <button className="btn-sm" onClick={()=>saveAdminScore(match.id)} disabled={adminSaving===match.id}>{adminSaving===match.id?'...':'Guardar'}</button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
